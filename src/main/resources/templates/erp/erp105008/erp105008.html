                search: function () {
                    var z = (new Date()).valueOf();
                    myGrid.clearAll(false);
                    searchRes = null;
                    searchRes = [];

                    if (!fnObj.searchOpen.searchChkVal.chkVal("search")) {
                        alert(chkValMsg);
                        return false;
                    }

                    var srchData = new FormData();
                    srchData.append("cmpyCd", myComboCmpyCd.getSelectedValue());
                    srchData.append("dtType", myComboDtType.getSelectedValue());
                    srchData.append("fromDt", $("#dateFrom").val().replace(/-/g, ""));
                    srchData.append("toDt", $("#dateTo").val().replace(/-/g, ""));
                    srchData.append("agntList", $("#srchCode").val());
                    srchData.append("dcList", myComboDcCd.getChecked());
                    srchData.append("soList", $("#soList").val().replace(/\n/g, ","));
                    srchData.append("soTypeList", myComboSoType.getChecked());
                    srchData.append("mallNm", $("#mall").val());
                    srchData.append("acptNm", $("#rcptNm").val());
                    srchData.append("acptTel", $("#rcptTel").val());
                    srchData.append("useYn", "");
                    srchData.append("refSoList", $("#refSoList").val().replace(/\n/g, ","));
                    srchData.append("prodList", $("#prodList").val().replace(/\n/g, ","));
                    srchData.append("prodNm", $("#prodNm").val());
                    srchData.append("srchAddr", $("#srchAddr").val());

                    $.ajax({
                        url: "/erp105008List",
                        processData: false,
                        contentType: false,
                        data: srchData,
                        type: "POST",
                        datatype: "json",
                        async: false,
                        success: function (res) {
                            if (res && res.length > 0) {
                                for (var k = 0; k < res.length; k++) {
                                    searchRes.push(res[k])
                                }
                            }
                        }
                    });

                    searchPaging(1);
                    toastr.remove()
                    console.log("search : " + ((new Date()).valueOf() - z) / 1000 + " 초");

                        chkValMsg = "";

                        if (chkGubn == "search") {

                                rtnVal = false;
                            }

        function searchPaging(page) {
            if ($("#rowPerPage").val()) {
                pagePerRow = parseInt($("#rowPerPage").val());
            }

            var pageRange = 10;
            var totalPageCnt = searchRes.length % pagePerRow == 0 ? parseInt(searchRes.length / pagePerRow) : parseInt(searchRes.length / pagePerRow) + 1

            var a = "<div class='pagination-container'>";

            var start = (page - 1);
            var end = (page - 1) + pageRange;

            if (start % pageRange != 0) {
                start = parseInt(start / pageRange) * pageRange;
            }

            if (end % pageRange != 0 || page == 1) {
                end = parseInt(end / pageRange) * pageRange;
            }

            if (start >= pageRange) {
                a += "<input type='button' onclick='searchPaging(" + 1 + ");' value='<<' class='pagination-button'>";
                a += "<input type='button' onclick='searchPaging(" + (start - 1) + ");' value='<' class='pagination-button'>";
            }

            var r = 0;

            for (r = start; r < end; r++) {
                if (r < totalPageCnt) {
                    if (r + 1 == page) {
                        a += "<input type='button' onclick='searchPaging(" + (r + 1) + ");' value=" + (r + 1) + " class='pagination-button active'>";
                    } else {
                        a += "<input type='button' onclick='searchPaging(" + (r + 1) + ");' value=" + (r + 1) + " class='pagination-button'>";
                    }
                }
            }

            if (end * pagePerRow < searchRes.length) {
                a += "<input type='button' onclick='searchPaging(" + (end + 1) + ");' value='>' class='pagination-button'>";
                a += "<input type='button' onclick='searchPaging(" + totalPageCnt + ");' value='>>' class='pagination-button'>";
            }

            a += "<div class='pagination-info'>";
            a += "<input type='number' maxlength=4 id='rowPerPage' value=" + pagePerRow + ">";
            a += "<input type='button' value='적용' onclick='searchPaging(" + 1 + ");' class='action-button'>";
            a += "&nbsp;&nbsp;<i class='fa fa-calculator fa-lg' aria-hidden='true'></i>&nbsp;" + searchRes.length;
            a += "</div></div>";
            $("#page").html(a);

            var is = (page - 1) * pagePerRow;
            var ie = (page - 1) * pagePerRow + pagePerRow;

            if (searchRes.length < ie) {
                ie = searchRes.length;
            }

            myGrid.clearAll(false);

            var columns = myGrid.getColumnCount()
            var x = (new Date()).valueOf();
            for (var i = is; i < ie; i++) {
                var jsonData = {};
                for (var c = 0; c < columns; c++) {
                    jsonData[myGrid.getColumnId(c)] = searchRes[i][myGrid.getColumnId(c)];
                }
                myGrid.addRow(i + 1, "");
                myGrid.setRowData(i + 1, jsonData);
                var soStatCdVal = myGrid.cellById(i + 1, myGrid.getColIndexById("soStatCd")).getValue()
                if (soStatCdVal == "8000") {
                    myGrid.setRowColor(i + 1, "#F5A9A9");
                }
                if (soStatCdVal == "8060") {
                    myGrid.setRowColor(i + 1, "#FF8000");
                }
            }
        }

        function excelDn() {
            if (!myGrid.getRowsNum()) {
                alert("엑셀다운로드 대상이 없습니다.\n조회해주세요");
                return;
            }
            exportExcel();
        }

        $(document).ready(function () {
            myWins = new dhtmlXWindows();
            myGrid = new dhtmlXGridObject('grid');

            myCalendar = new dhtmlXCalendarObject([{input: "dateFrom", button: "dateFromIcon"}, {
                input: "dateTo",
                button: "dateToIcon"
            }]);

            var now = new Date()
            var year = now.getFullYear() + "";
            var month = (now.getMonth() + 1) + "";
            var date = now.getDate() + "";
            if (month.length == 1) {
                month = "0" + month;
            }
            if (date.length == 1) {
                date = "0" + date;
            }

            var today = year + "-" + month + "-" + date;

            $("#dateFrom").val(today);

            fnObj.comboOpen.comboCmpyCd();

            sessionUserGrntCd =  /*[[${session.userGrntCd}]]*/

        });
