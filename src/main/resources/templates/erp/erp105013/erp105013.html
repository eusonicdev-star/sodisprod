<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>재고 엑셀 업로드</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="https://cdn.dhtmlx.com/edge/skins/web/dhtmlx.css">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <script src="https://cdn.dhtmlx.com/edge/dhtmlx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.14.3/xlsx.full.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { padding: 20px; font-family: 'Roboto', sans-serif; }
        .upload-box { border: 2px dashed #3b82f6; padding: 25px; text-align: center; margin-bottom: 20px; border-radius: 12px; background: #f8fafc; }
        .btn-area { margin-bottom: 10px; text-align: right; }
        #gridbox { width: 100%; height: 450px; border: 1px solid #dfe4e8; }
        .action-button { padding: 8px 15px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; font-size: 13px; }
        .primary { background-color: #3b82f6; color: white; border: none; }
        .secondary { background-color: #fff; color: #333; }
    </style>
</head>
<body>

<div class="upload-box">
    <input type="file" id="excelFile" accept=".xlsx, .xls" style="display:none" onchange="readExcel(event)">
    <button class="action-button secondary" onclick="document.getElementById('excelFile').click()">📁 재고 엑셀 파일 선택</button>
    <p style="font-size: 12px; color: #64748b; margin-top: 12px;">
        필수 항목: <b>업체명, 제품코드, 제품명, 실사위치, 수량, 파렛트규격</b>
    </p>
</div>

<div class="btn-area" style="text-align: left; display: flex; gap: 5px;">
    <button class="action-button" style="background-color: #ef4444; color: white; font-weight: bold;" onclick="fnFilterError()">⚠️ 오류 행만 보기</button>
    <button class="action-button" style="background-color: #64748b; color: white;" onclick="fnFilterAll()">🔄 전체 보기</button>

    <div style="margin-left: auto; display: flex; gap: 5px;">
        <button class="action-button primary" onclick="fnTempSave()">💾 임시 저장</button>
        <button class="action-button secondary" onclick="fnCreateMissingLoc()">누락 로케이션 생성</button>
        <button class="action-button secondary" onclick="fnCreateFloorLoc()">🏢 평치존 만들기</button>
        <button class="action-button primary" onclick="fnFinalConfirm()">🚀 최종 재고 실사 내역 반영하기</button>
    </div>
</div>

<div id="gridbox"></div>

<script th:inline="javascript">
    var myGrid;
    var loginUser = /*[[${session.userId}]]*/ 'SYSTEM';

    $(document).ready(function () {
        myGrid = new dhtmlXGridObject('gridbox');
        myGrid.setImagePath("https://cdn.dhtmlx.com/edge/skins/web/imgs/");

        // [수정] 헤더 구성 및 인덱스 고정 (등록일 맨 뒤)
        myGrid.setHeader("화주사명,상품코드,상품명,로케이션,수량,팔렛트구분,상태,화주코드,로케이션ID,로케이션명,상품확인,등록일");
        myGrid.setColumnIds("agntNm,mtrlCd,mtrlNm,locCd,stockQty,paltType,status,agntCd,locId,locNm,mtrlYn,saveTime");
        myGrid.setInitWidths("120,100,180,120,80,100,80,80,80,120,80,200");
        myGrid.setColAlign("left,center,left,center,right,center,center,center,center,left,center,center");
        myGrid.setColTypes("ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro");
        myGrid.init();

        loadTempList();
    });

    function readExcel(event) {
        var input = event.target;
        var reader = new FileReader();
        reader.onload = function () {
            var fileData = reader.result;
            var workbook = XLSX.read(fileData, { type: 'binary' });
            var sheetName = workbook.SheetNames[0];
            var jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

            myGrid.clearAll();
            jsonData.forEach(function(row, idx) {
                // [중요] 이미지에 보이는 컬럼명과 정확히 일치시켜야 합니다.
                var gridRow = [
                    row['화주사명'] || '',     // 0번 인덱스
                    row['상품코드'] || '',     // 1번 인덱스
                    row['상품명'] || '',       // 2번 인덱스
                    row['로케이션'] || '',     // 3번 인덱스
                    row['수량'] || 0,          // 4번 인덱스
                    row['파렛트규격'] || '',    // 5번 인덱스
                    "<span style='color:blue'>대기</span>", // 6. 상태
                    '', '', '', '', ''        // 7~11번 빈값 (화주코드, 로케이션ID 등)
                ];
                myGrid.addRow(idx + 1, gridRow);
            });
        };
        reader.readAsBinaryString(input.files[0]);
    }

    function fnTempSave() {
        var rowCount = myGrid.getRowsNum();
        if (rowCount === 0) { alert("업로드할 데이터가 없습니다."); return; }
        if (!confirm("기존 데이터를 삭제하고 현재 내용을 임시 저장하시겠습니까?")) return;

        var dataList = [];
        for (var i = 0; i < rowCount; i++) {
            var rId = myGrid.getRowId(i);
            dataList.push({
                cmpyCd: 'A',
                whCd: '1000',
                agntNm: myGrid.cells(rId, 0).getValue(),
                mtrlCd: myGrid.cells(rId, 1).getValue(),
                mtrlNm: myGrid.cells(rId, 2).getValue(),
                locCd: myGrid.cells(rId, 3).getValue(),
                stockQty: myGrid.cells(rId, 4).getValue(),
                paltType: myGrid.cells(rId, 5).getValue(),
                saveUser: loginUser
            });
        }

        $.ajax({
            url: "/erp105013TempSave",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(dataList),
            success: function () {
                alert("임시 저장이 완료되었습니다.");
                loadTempList();
            },
            error: function () { alert("임시 저장 중 오류 발생"); }
        });
    }

    function loadTempList() {
        $.ajax({
            url: "/erp105013TempList",
            type: "POST",
            data: { cmpyCd: 'A', whCd: '1000' },
            success: function (res) {
                myGrid.clearAll();
                if (res && res.length > 0) {
                    res.forEach(function(item, idx) {
                        var rId = idx + 1;
                        var statusText = (item.status === 'C') ?
                            "<span style='color:#666; font-weight:bold;'>완료</span>" :
                            "<span style='color:green; font-weight:bold;'>저장</span>";

                        myGrid.addRow(rId, [
                            item.agntNm, item.mtrlCd, item.mtrlNm, item.locCd, item.stockQty, item.paltType,
                            statusText, item.agntCd, item.locId, item.locNm, item.mtrlYn, item.saveTime || '-'
                        ]);

                        // 인덱스 보정: agntCd(7), mtrlYn(10)
                        if (item.status === 'C') {
                            myGrid.setRowTextStyle(rId, "background-color: #EAEAEA; color: #888;");
                        } else if (!item.agntCd || item.agntCd.trim() === '' || item.mtrlYn === 'N') {
                            myGrid.setRowTextStyle(rId, "background-color: #FFD9D9;");
                        }
                    });
                }

                var hasCompleted = false;
                myGrid.forEachRow(function(id) {
                    if (myGrid.cells(id, 6).getValue().indexOf("완료") !== -1) {
                        hasCompleted = true;
                    }
                });

                if (hasCompleted) {
                    // 버튼을 비활성화하고 색상을 회색으로 변경
                    $(".primary:contains('최종 재고 실사 내역 반영하기')").prop("disabled", true).css({
                        "background-color": "#cbd5e1",
                        "cursor": "not-allowed"
                    });
                } else {
                    // 다시 활성화 (새 파일을 올렸을 경우 대비)
                    $(".primary:contains('최종 재고 실사 내역 반영하기')").prop("disabled", false).css({
                        "background-color": "#3b82f6",
                        "cursor": "pointer"
                    });
                }

            }
        });
    }

    function fnCreateMissingLoc() {
        if (!confirm("누락된 로케이션을 생성하시겠습니까?")) return;
        $.ajax({
            url: "/erp105013CreateMissingLoc",
            type: "POST",
            data: { cmpyCd: 'A', whCd: '1000', saveUser: loginUser },
            success: function (res) { alert(res + "개 생성 완료"); loadTempList(); }
        });
    }

    function fnCreateFloorLoc() {
        if (!confirm("화주사별 평치존을 생성하시겠습니까?")) return;
        $.ajax({
            url: "/erp105013CreateFloorLoc",
            type: "POST",
            data: { cmpyCd: 'A', whCd: '1000', saveUser: loginUser },
            success: function () { alert("생성 완료"); loadTempList(); }
        });
    }

    function fnFinalConfirm() {
        var errorRows = 0;
        myGrid.forEachRow(function(id) {
            var agntCd = myGrid.cells(id, 7).getValue();  // 화주코드(7)
            var mtrlYn = myGrid.cells(id, 10).getValue(); // 상품확인(10)
            if (!agntCd || agntCd.trim() === '' || mtrlYn === 'N') errorRows++;
        });

        if (errorRows > 0) {
            if (!confirm("오류 데이터가 " + errorRows + "건 있습니다. 진행하시겠습니까?")) return;
        } else {
            if (!confirm("실제 재고로 최종 반영하시겠습니까?")) return;
        }

        $.ajax({
            url: "/erp105013Confirm",
            type: "POST",
            data: { cmpyCd: 'A', whCd: '1000', saveUser: loginUser },
            success: function () {
                alert("최종 반영 완료");
                loadTempList();
            }
        });
    }

    function fnFilterError() {
        // 1. 먼저 모든 필터를 초기화하여 전체 데이터를 대상으로 합니다.
        myGrid.filterBy(0, "");

        // 2. 커스텀 필터링 로직 실행
        myGrid.filterBy(10, function(value, id) {
            // value는 10번 컬럼(mtrlYn)의 값입니다.
            var agntCd = myGrid.cells(id, 7).getValue(); // 화주코드(7)
            var status = myGrid.cells(id, 6).getValue(); // 상태(6) - '완료' 포함 여부 체크용

            // 화주코드가 없거나(null/empty), 상품확인이 'N'인 경우만 노출
            // 만약 '완료'된 항목은 에러에서 제외하고 싶다면 status 조건도 추가 가능합니다.
            var isError = (!agntCd || agntCd.trim() === '' || value === 'N');

            return isError;
        });
    }

    function fnFilterAll() {
        // 모든 필터를 해제하고 전체 행을 다시 표시합니다.
        myGrid.filterBy(0, "");
        myGrid.render_dataset(); // 그리드를 다시 그려 필터를 완전히 제거
    }
</script>
</body>
</html>
