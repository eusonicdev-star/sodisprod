<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
</head>
<body>
<script>
  console.log("document.cookie =", document.cookie);  // 👈 이 줄 추가해서 확인

  function getCookie(name) {
    const value = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return value ? value.pop() : null;
  }

  const loginId = getCookie("LOGIN_ID");
  console.log("LOGIN_ID =", loginId);

  if (loginId) {
    window.location.href = "/hyapp/main";
  } else {
    window.location.href = "/hyapp/login";
  }
</script>
</body>
</html>
