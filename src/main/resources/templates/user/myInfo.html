<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>내 정보</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="https://cdn.dhtmlx.com/edge/fonts/font_roboto/roboto.css">
    <link rel="stylesheet" type="text/css"
          href="https://cdn.dhtmlx.com/edge/fonts/font_awesome/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.dhtmlx.com/edge/skins/material/dhtmlx.css">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .info-container {
            padding: 20px;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .info-table td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        .info-table td:first-child {
            width: 150px;
            background-color: #f5f5f5;
            font-weight: bold;
        }

        .info-title {
            color: #333;
            margin-bottom: 20px;
        }

        .password-form {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .form-group {
            margin: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .btn-update {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-update:hover {
            background-color: #45a049;
        }

        .error-message {
            color: red;
            margin: 10px;
            display: none;
        }

        ul#passwordPolicyList {
            list-style: none;
            padding-left: 0;
        }

        ul#passwordPolicyList li {
            margin-top: 5px;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="info-container">
    <h3 class="info-title">내 정보</h3>
    <table class="info-table">
        <tr>
            <td>사용자 ID</td>
            <td th:text="${session.userId}"></td>
        </tr>
        <tr>
            <td>사용자 이름</td>
            <td th:text="${session.userNm}"></td>
        </tr>
        <tr>
            <td>회사명</td>
            <td th:text="${session.cmpyNm}"></td>
        </tr>
        <tr>
            <td>권한명</td>
            <td th:text="${session.userGrntNm}"></td>
        </tr>
        <tr>
            <td>IP 주소</td>
            <td th:text="${session.userIp}"></td>
        </tr>
    </table>

    <div class="password-form">
        <h3>비밀번호 변경</h3>
        <div class="form-group">
            <label for="currentPassword">현재 비밀번호</label>
            <input type="password" id="currentPassword" name="currentPassword">
            <div class="error-message" id="currentPasswordError"></div>
        </div>

        <div class="form-group">
            <label for="newPassword">새 비밀번호</label>
            <input type="password" id="newPassword" name="newPassword">
            <ul id="passwordPolicyList">
                <li id="rule-length">❌ 8~15자 길이</li>
                <li id="rule-lower">❌ 영문 소문자 포함</li>
                <li id="rule-digit">❌ 숫자 포함</li>
                <li id="rule-special">❌ 특수문자 포함</li>
            </ul>

        </div>

        <div class="form-group">
            <label for="confirmPassword">새 비밀번호 확인</label>
            <input type="password" id="confirmPassword" name="confirmPassword">
            <div class="error-message" id="passwordMatchCheck" style="display: none;"></div>
            <div class="error-message" id="confirmPasswordError"></div>
        </div>

        <div class="error-message" id="newPasswordError"></div>

        <button class="btn-update" onclick="updatePassword()">비밀번호 변경</button>
    </div>
</div>

<script>
    function checkPasswordRules(password) {
        const lengthValid = password.length >= 8 && password.length <= 15;
        const lowerValid = /[a-z]/.test(password);
        const digitValid = /\d/.test(password);
        const specialValid = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);

        updateRuleUI('#rule-length', lengthValid);
        updateRuleUI('#rule-lower', lowerValid);
        updateRuleUI('#rule-digit', digitValid);
        updateRuleUI('#rule-special', specialValid);

        return lengthValid && lowerValid && digitValid && specialValid;
    }

    function updateRuleUI(selector, isValid) {
        const rule = $(selector);
        const text = rule.text().replace(/^✅ |^❌ /, '');
        if (isValid) {
            rule.text('✅ ' + text).css('color', 'green');
        } else {
            rule.text('❌ ' + text).css('color', 'red');
        }
    }

    $(document).ready(function () {
        $('#newPassword').on('input', function () {
            const password = $(this).val();
            checkPasswordRules(password);
        });

        $('#confirmPassword').on('input', function () {
            const newPassword = $('#newPassword').val();
            const confirmPassword = $(this).val();
            const $matchCheck = $('#passwordMatchCheck');

            if (!confirmPassword) {
                $matchCheck.hide();
                return;
            }

            if (newPassword === confirmPassword) {
                $matchCheck.text('✅ 비밀번호가 일치합니다.').css('color', 'green').show();
            } else {
                $matchCheck.text('❌ 비밀번호가 일치하지 않습니다.').css('color', 'red').show();
            }
        });
    });

    function updatePassword() {
        $('.error-message').hide();

        const currentPassword = $('#currentPassword').val();
        const newPassword = $('#newPassword').val();
        const confirmPassword = $('#confirmPassword').val();

        if (!currentPassword) {
            $('#currentPasswordError').text('현재 비밀번호를 입력해주세요.').show();
            return;
        }
        if (!newPassword) {
            $('#newPasswordError').text('새 비밀번호를 입력해주세요.').show();
            return;
        }
        if (!checkPasswordRules(newPassword)) {
            $('#newPasswordError').text('비밀번호가 조건을 만족하지 않습니다.').show();
            return;
        }
        if (!confirmPassword) {
            $('#confirmPasswordError').text('새 비밀번호 확인을 입력해주세요.').show();
            return;
        }
        if (newPassword !== confirmPassword) {
            $('#confirmPasswordError').text('새 비밀번호가 일치하지 않습니다.').show();
            return;
        }

        $.ajax({
            url: '/updatePassword',
            method: 'POST',
            data: {
                currentPassword: currentPassword,
                newPassword: newPassword
            },
            success: function (response) {
                if (response) {
                    alert('비밀번호가 성공적으로 변경되었습니다.');
                    $('#currentPassword').val('');
                    $('#newPassword').val('');
                    $('#confirmPassword').val('');
                    $('#passwordMatchCheck').hide();
                    $('#passwordPolicyList li').each(function () {
                        $(this).text($(this).text().replace('✅', '❌')).css('color', 'gray');
                    });
                } else {
                    alert('비밀번호 변경에 실패했습니다. 현재 비밀번호를 확인해주세요.');
                }
            },
            error: function () {
                alert('서버 오류가 발생했습니다. 다시 시도해주세요.');
            }
        });
    }
</script>
</body>
</html>
