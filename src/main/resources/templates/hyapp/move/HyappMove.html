<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>로케이션/존 이동 (HyappMove)</title>
    <style>
        :root { --bg:#f7f7f7; --card:#fff; --bd:#e8e8e8; --txt:#111; --sub:#666; --blue:#0369a1; --light-blue:#eef7ff; }
        body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--txt); }
        header { position: sticky; top:0; background:#fff; border-bottom:1px solid #e5e5e5; padding:12px 16px; z-index:10; }
        h1 { margin:0; font-size:16px; }
        main { padding:16px; padding-bottom:40px; }

        .step-container { display: flex; justify-content: space-between; margin-bottom: 16px; background: #fff; padding: 12px; border-radius: 14px; border: 1px solid var(--bd); }
        .step { font-size: 11px; color: #ccc; text-align: center; flex: 1; }
        .step.active { color: var(--blue); font-weight: bold; border-bottom: 2px solid var(--blue); padding-bottom: 4px; }

        .card { background:var(--card); border:1px solid var(--bd); border-radius:14px; padding:14px; margin-bottom:12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .label { font-size:13px; font-weight:600; margin-bottom:8px; display:block; color: var(--sub); }
        .row { display:flex; gap:8px; align-items:center; }
        .input, select { width:100%; padding:12px; border:1px solid #ddd; border-radius:10px; font-size:16px; box-sizing:border-box; height: 44px; background:#fff; }
        .btn { padding:12px 14px; border:1px solid #ddd; border-radius:10px; background:#fff; font-size:14px; cursor:pointer; height: 44px; white-space:nowrap; }
        .btn.dark { background:#111; color:#fff; border-color:#111; }
        .btn.primary { background:var(--blue); color:#fff; border-color:var(--blue); width: 100%; font-weight: 600; margin-top: 10px; }
        .btn:disabled { opacity: 0.5; cursor:not-allowed; }

        .input-wrapper { position: relative; flex: 1; display: flex; align-items: center; }
        .btn-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            border: none; background: #cbd5e1; color: #fff; border-radius: 50%;
            width: 24px; height: 24px; font-size: 14px; cursor: pointer;
            display: none; align-items: center; justify-content: center; z-index: 5;
        }

        .stock-item { border: 1px solid #eee; border-radius: 10px; padding: 12px; margin-top: 8px; cursor: pointer; }
        .stock-item.selected { border-color: var(--blue); background: var(--light-blue); }
        .stock-item b { font-size: 14px; display: block; }
        .stock-item span { font-size: 12px; color: var(--sub); }

        .status { margin: 10px 0; font-size: 13px; color: #555; min-height: 18px; text-align: center; }
        .toast-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px;
            border-radius: 30px; z-index: 9999; display: none; font-size: 14px;
        }

        .toggle { display:flex; gap:8px; align-items:center; padding:6px; border:1px solid var(--bd); border-radius:999px; background:#fff; width:max-content; margin-bottom:10px; }
        .toggle button { border:0; background:transparent; padding:8px 12px; border-radius:999px; font-size:13px; cursor:pointer; color:#555; }
        .toggle button.active { background:var(--blue); color:#fff; font-weight:700; }
    </style>
</head>
<body>

<header>
    <h1>재고 이동 (로케이션 / 존)</h1>
</header>

<main>
    <div class="step-container">
        <div id="step1" class="step active">1.출발지</div>
        <div id="step2" class="step">2.상품 선택</div>
        <div id="step3" class="step">3.목적지</div>
    </div>

    <div id="status" class="status">출발 로케이션을 스캔하세요.</div>

    <div class="card" id="sec1">
        <div class="toggle">
            <button type="button" id="modeLocBtn" class="active" onclick="setMoveMode('LOC')">로케이션</button>
            <button type="button" id="modeZoneBtn" onclick="setMoveMode('ZONE')">존</button>
        </div>

        <label class="label" id="fromLabel">출발 로케이션 (From)</label>
        <div id="fromLocBox">
            <div class="row">
                <div class="input-wrapper">
                    <input id="fromLocInput" class="input" placeholder="바코드 스캔" inputmode="none" autocomplete="off" />
                    <button type="button" class="btn-clear" id="fromClearBtn" onclick="clearInput('fromLocInput')">✕</button>
                </div>
                <button class="btn dark" type="button" onclick="requestScan('FROM')">스캔</button>
                <button class="btn" type="button" onclick="loadStock()">조회</button>
            </div>
        </div>

        <div id="fromZoneBox" style="display:none;">
            <div class="row">
                <select id="fromZoneSelect"><option value="">출발 존 선택</option></select>
                <button class="btn" type="button" onclick="loadStock()">조회</button>
            </div>
        </div>
    </div>

    <div class="card" id="sec2" style="display:none;">
        <label class="label">이동할 상품 선택</label>
        <div id="stockList"></div>
        <div id="qtySection" style="display:none; margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
            <label class="label">이동 수량 (최대 <span id="maxQty">0</span>)</label>
            <div class="row">
                <input id="moveQtyInput" class="input" type="number" inputmode="numeric" />
                <button class="btn" type="button" onclick="fillMax()">최대</button>
            </div>
        </div>
    </div>

    <div class="card" id="sec3" style="display:none;">
        <label class="label" id="toLabel">목적 로케이션 (To)</label>
        <div id="toLocBox">
            <div class="row">
                <div class="input-wrapper">
                    <input id="toLocInput" class="input" placeholder="목적지 바코드 스캔" inputmode="none" autocomplete="off" />
                    <button type="button" class="btn-clear" id="toClearBtn" onclick="clearInput('toLocInput')">✕</button>
                </div>
                <button class="btn dark" type="button" onclick="requestScan('TO')">스캔</button>
            </div>
        </div>
        <div id="toZoneBox" style="display:none;">
            <select id="toZoneSelect"><option value="">도착 존 선택</option></select>
        </div>
        <button class="btn primary" id="saveBtn" type="button" onclick="saveMove()">재고 이동 저장</button>
    </div>
</main>

<div id="toast" class="toast-msg"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const CMPY_CD = urlParams.get('cmpyCd') || 'A';
    const USER_ID = urlParams.get('userId') || 'ADMIN';

    let moveMode = 'LOC';
    let selectedStock = null;
    let items = [];
    let zones = [];

    const statusEl = document.getElementById("status");
    const fromLocInput = document.getElementById("fromLocInput");
    const toLocInput = document.getElementById("toLocInput");
    const fromZoneSelect = document.getElementById("fromZoneSelect");
    const toZoneSelect = document.getElementById("toZoneSelect");

    /** 1. 토스트 메시지 함수 (누락 해결) **/
    function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }

    /** 2. X 버튼 제어 함수 **/
    function toggleClearBtn(inputEl, btnId) {
        const btn = document.getElementById(btnId);
        if (btn) btn.style.display = inputEl.value.length > 0 ? 'flex' : 'none';
    }

    function clearInput(id) {
        const inp = document.getElementById(id);
        if (inp) {
            inp.value = "";
            toggleClearBtn(inp, id === 'fromLocInput' ? 'fromClearBtn' : 'toClearBtn');
            if (id === 'fromLocInput') resetFlow();
            inp.focus();
        }
    }

    /** 3. 재고 조회 및 자동 선택 **/
    async function loadStock() {
        resetFlow();
        let fromLocCd = "";
        if (moveMode === 'LOC') {
            fromLocCd = fromLocInput.value.trim();
            if(!fromLocCd) return alert("출발 로케이션을 스캔하세요.");
        } else {
            const zId = fromZoneSelect.value;
            if(!zId) return alert("출발 존을 선택하세요.");
            fromLocCd = await resolveZoneToLocCd(zId);
        }

        statusEl.textContent = "조회 중...";
        try {
            const res = await fetch(`/hyapp/api/stock/location/list?cmpyCd=${encodeURIComponent(CMPY_CD)}&locationCd=${encodeURIComponent(fromLocCd)}`);
            const data = await res.json();

            // 데이터 키 유연하게 대응
            items = data.items || data.data || (Array.isArray(data) ? data : []);

            if (items.length === 0) {
                statusEl.textContent = "재고가 없습니다.";
                return;
            }

            renderList(items);

            // [핵심] 상품이 하나면 자동 선택
            if (items.length === 1) {
                showToast("📍 단일 상품 자동 선택됨");
                selectItem(0);
            } else {
                setStep(2);
                statusEl.textContent = "이동할 상품을 선택하세요.";
            }
        } catch(e) {
            statusEl.textContent = "조회 실패";
        }
    }

    function renderList(list) {
        const cont = document.getElementById("stockList");
        cont.innerHTML = list.map((it, idx) => {
            const aCd = it.agntCd || it.AGNT_CD || "";
            const mNm = it.mtrlNm || it.MTRL_NM || it.mtrlCd || it.MTRL_CD || '상품명 없음';
            const mCd = it.mtrlCd || it.MTRL_CD || '';
            const qty = it.stockQty ?? it.STOCK_QTY ?? 0;

            // items[idx] 객체 자체에 agntCd가 포함되도록 보장
            it.agntCd = aCd;

            return `<div class="stock-item" onclick="selectItem(${idx})" id="item_${idx}"><b>${mNm}</b><span>코드: ${mCd} | 재고: <b>${qty}</b></span></div>`;
        }).join("");
    }

    /** 4. 상품 선택 시 목적지 자동 포커스 **/
    function selectItem(idx) {
        selectedStock = items[idx];
        document.querySelectorAll('.stock-item').forEach(el => el.classList.remove('selected'));
        const targetEl = document.getElementById(`item_${idx}`);
        if(targetEl) targetEl.classList.add('selected');

        document.getElementById("qtySection").style.display = "block";
        document.getElementById("maxQty").textContent = selectedStock.stockQty ?? selectedStock.STOCK_QTY ?? 0;
        document.getElementById("moveQtyInput").value = selectedStock.stockQty ?? selectedStock.STOCK_QTY ?? 0;

        setStep(3);
        statusEl.textContent = "목적지 바코드를 스캔하세요.";

        // [핵심] 목적지 입력창 자동 포커스
        setTimeout(() => {
            toLocInput.readOnly = true;
            toLocInput.focus();
            setTimeout(() => { toLocInput.readOnly = false; }, 100);
        }, 300);
    }

    function setMoveMode(mode) {
        moveMode = mode;
        document.getElementById('modeLocBtn').classList.toggle('active', mode === 'LOC');
        document.getElementById('modeZoneBtn').classList.toggle('active', mode === 'ZONE');
        document.getElementById('fromLocBox').style.display = (mode === 'LOC' ? 'block' : 'none');
        document.getElementById('fromZoneBox').style.display = (mode === 'ZONE' ? 'block' : 'none');
        document.getElementById('toLocBox').style.display = (mode === 'LOC' ? 'block' : 'none');
        document.getElementById('toZoneBox').style.display = (mode === 'ZONE' ? 'block' : 'none');
        resetFlow();
    }

    function resetFlow() {
        selectedStock = null;
        document.getElementById("stockList").innerHTML = "";
        document.getElementById("qtySection").style.display = "none";
        setStep(1);
    }

    function setStep(n) {
        document.getElementById("sec2").style.display = n >= 2 ? "block" : "none";
        document.getElementById("sec3").style.display = n >= 3 ? "block" : "none";
        document.querySelectorAll('.step').forEach((el, i) => el.classList.toggle('active', i + 1 === n));
    }

    function fillMax() { if(selectedStock) document.getElementById("moveQtyInput").value = document.getElementById("maxQty").textContent; }

    async function saveMove() {
        if (!selectedStock) return alert("상품을 선택하세요.");

        const currentAgntCd = selectedStock.agntCd || selectedStock.AGNT_CD;

        if (!currentAgntCd) {
            return alert("화주 정보(AGNT_CD)가 없는 상품은 이동할 수 없습니다.");
        }

        const fromVal = moveMode === 'LOC' ? fromLocInput.value : await resolveZoneToLocCd(fromZoneSelect.value);
        const toVal = moveMode === 'LOC' ? toLocInput.value : await resolveZoneToLocCd(toZoneSelect.value);
        const qty = Number(document.getElementById("moveQtyInput").value);

        if(!toVal) return alert("목적지를 입력하세요.");
        if(qty <= 0) return alert("수량을 확인하세요.");

        try {
            const res = await fetch('/hyapp/api/stock/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    cmpyCd: CMPY_CD,
                    agntCd: currentAgntCd,
                    mtrlCd: selectedStock.mtrlCd || selectedStock.MTRL_CD,
                    fromLocationCd: fromVal,
                    toLocationCd: toVal,
                    moveQty: qty,
                    userId: USER_ID
                })
            });
            const result = await res.json();
            if (result.success) { alert("이동 완료"); location.reload(); }
            else alert("실패: " + result.message);
        } catch(e) { alert("서버 통신 오류"); }
    }

    async function resolveZoneToLocCd(zId) {
        const res = await fetch(`/hyapp/api/wh/loc/by-zone?zoneId=${zId}`);
        const d = await res.json();
        return d.locCd || d.LOC_CD;
    }

    window.onload = function() {
        // 입력 이벤트 연결 (X버튼 제어)
        fromLocInput.addEventListener('input', () => toggleClearBtn(fromLocInput, 'fromClearBtn'));
        toLocInput.addEventListener('input', () => toggleClearBtn(toLocInput, 'toClearBtn'));

        // 엔터키 조회
        fromLocInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') loadStock(); });

        fromLocInput.focus();
    };

    function requestScan(target) {
        if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: "requestBarcodeScan", target: target }));
        } else {
            const bc = prompt("바코드 입력:");
            if(bc) {
                if(target === 'FROM') { fromLocInput.value = bc; loadStock(); }
                else { toLocInput.value = bc; toggleClearBtn(toLocInput, 'toClearBtn'); }
            }
        }
    }
</script>
</body>
</html>
