	<link rel="stylesheet" type="text/css" href="https://cdn.dhtmlx.com/edge/fonts/font_awesome/css/font-awesome.min.css">

	<link rel="stylesheet" type="text/css" href="/css/common.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script type="text/javascript" src="/js/common.js"></script>
    <script type="text/javascript" src="/js/commCode.js"></script>	
	
	<script th:inline="javascript" >
	var myGrid;
	var myGrid2;
	var myCalendar;
	fnObj = {
			winOpen:{
			
			},	//END of winOpen
			comboOpen:{
				comboCmpyCd : function(){		//회사콤보목록
					myComboCmpyCd = new dhtmlXCombo("cmpyCd");
			    	comboList(myComboCmpyCd,'A','COMM','CMPY_CD','','Y','');		     
			    	myComboCmpyCd.selectOption(myComboCmpyCd.getIndexByValue(/*[[${session.cmpyCd}]]*/));
			    	myComboCmpyCd.setFontSize("12px","12px");
			    	myComboCmpyCd.attachEvent("onChange", function(value, text){
			    		myGrid.clearAll(false);
			    	});
			    	myComboCmpyCd.disable();
			    	
				},	
				comboClndType : function(){		//달력유형 콤보
					myComboClndType = new dhtmlXCombo("clndType");
					myComboClndType.addOption([{value:"1", text:"범위"}]);
					myComboClndType.addOption([{value:"2", text:"단일"}]);
					myComboClndType.addOption([{value:"3", text:"다중"}]);
			    	myComboClndType.selectOption(0);
			    	myComboClndType.setFontSize("12px","12px");
			    	myComboClndType.attachEvent("onChange", function(value, text){
			    		if(value == "1")
			    		{
			    			$("#fromTo").show();
			    			$("#dateOne").hide();
			    			$("#dateInput").hide();
			    		}
			    		else if(value == "2")
			    		{
			    			$("#fromTo").hide();
			    			$("#dateOne").show();
			    			$("#dateInput").hide();
			    		}
			    		else if(value == "3")
			    		{
			    			$("#fromTo").hide();
			    			$("#dateOne").hide();
			    			$("#dateInput").show();
			    		}
			    	});

				},	
				comboInstCapaCtgr : function(){		//시공카테고리 콤보
					myComboInstCapaCtgr = new dhtmlXCombo("instCapaCtgr");
			    	comboList(myComboInstCapaCtgr,'A','COMM','INST_CAPA_CTGR','','Y','req');		     
			    	myComboInstCapaCtgr.selectOption(0);
			    	myComboInstCapaCtgr.setFontSize("12px","12px");
			    	myComboInstCapaCtgr.attachEvent("onChange", function(value, text){
			    		
			    	});
				},	
				
				comboZoneType : function(){		//권역유형 콤보
					myComboZoneType = new dhtmlXCombo("zoneType");
			    	comboList(myComboZoneType,'A','COMM','ZONE_TYPE','','Y','req');		     

			    	myComboZoneType.selectOption(0);
			    	myComboZoneType.setFontSize("12px","12px");
			    	myComboZoneType.attachEvent("onChange", function(value, text){
			    		myGrid2.clearAll(false);
			    		
			    		var comboForm = new FormData();
			    		 comboForm.append("cmpyCd",myComboCmpyCd.getSelectedValue());
			    		 comboForm.append("comboType","COMM");
			    		 comboForm.append("commCd",myComboZoneType.getSelectedValue());
			    		 comboForm.append("comdCd","");
			    		 comboForm.append("useYn","Y");

			    		$.ajax({
			    	        url: "/comComboList",
			    	        processData : false,
			    			contentType : false,
			    	        data: comboForm,
			    	        type:"POST",
			    	        datatype:"json",
			    	        async:false,		//동기식
			    	        success : function(res){
			    	        	if(res)	
			    	        	{	
			    	        		var columns = myGrid.getColumnCount()
			    	        		for(var i=0;i<res.length;i++){
		    	            			var jsonData = {};
		    	            			for (var c=0; c<columns; c++){ 
		   	            					jsonData[myGrid2.getColumnId(c)] = res[i][myGrid2.getColumnId(c)];
		    	                		}
		    	            			myGrid2.addRow(i+1,"");	//로우 추가	//로우는 1부터 시작해야함. 0부터 시작하면 안됨. 그래서 i 에 1을 더함
		    	            			myGrid2.setRowData(i+1,jsonData);
			    	        		}
			    	        	}
			    	        	else	
			    	        	{
			    	        		alert("콤보조회 로직 조회 실패");
			    	        	}
			    	        },
			    	        error : function(res) {
			    	        	alert("콤보조회 로직 수행 실패");
			    			}
			    		});
			    	});
				},	
				comboInstCapaType : function(){		//시공유형 콤보
					myComboInstCapaType = new dhtmlXCombo("instCapaType");
			    	comboList(myComboInstCapaType,'A','COMM','INST_CAPA_TYPE','','Y','req');		     
			    	myComboInstCapaType.selectOption(0);
			    	myComboInstCapaType.setFontSize("12px","12px");
			    	myComboInstCapaType.attachEvent("onChange", function(value, text){
			    		
			    	});
			    	
				},	
			
			},	//END of comboOpen
			gridOpen : {
				grid : function()
				{
					myGrid.setImagePath("https://cdn.dhtmlx.com/edge/skins/terrace/imgs/");
					myGrid.setHeader("회사코드,시공일자,요일코드,요일,시공<br>카테고리코드,시공<br>카테고리,시공유형코드,시공유형,시공좌석유형코드,시공좌석<br>유형,권역유형코드,권역유형,권역코드,권역,총좌석수,판매오더번호,점유<br>좌석,화주사코드,화주사,오더유형코드,오더유형,오더상태코드,오더상태,쇼핑몰,고객명,점유일");

					myGrid.setColumnIds("cmpyCd,instDt,weekCd,weekNm,capaCtgr,capaCtgrNm,capaType,capaTypeNm,seatType,seatTypeNm,zoneType,zoneTypeNm,zoneCd,zoneCdNm,totCapa,ordrNo,useCapa,agntCd,agntNm,soType,soTypeNm,soStatCd,soStatNm,mallCd,acptEr,saveTime");
					myGrid.setInitWidths("80,80,80,50,100,70,70,70,70,70,100,100,100,100,70,110,60,100,160,130,100,120,100,160,120,160");
					myGrid.setColAlign("center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,center,left");
					myGrid.setColTypes("ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,edn,ro,ro,ro,ed,ro,ro,ro,ro,ro,ro");
					//myGrid.setColSorting(",str,str,str,str,str,str,str,str,str,str,str,str,str,str,str,str,str,str,str,str,str,str,str,str,str");
					//myGrid.attachHeader(",#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#numeric_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,#text_filter,");

					
					
					myGrid.setColumnHidden(myGrid.getColIndexById("cmpyCd"),true);	//컬럼 아이디로 해당 컬럼 가리기
					myGrid.setColumnHidden(myGrid.getColIndexById("weekCd"),true);	//컬럼 아이디로 해당 컬럼 가리기
					myGrid.setColumnHidden(myGrid.getColIndexById("capaCtgr"),true);	//컬럼 아이디로 해당 컬럼 가리기
					myGrid.setColumnHidden(myGrid.getColIndexById("capaType"),true);	//컬럼 아이디로 해당 컬럼 가리기
					myGrid.setColumnHidden(myGrid.getColIndexById("seatType"),true);	//컬럼 아이디로 해당 컬럼 가리기
					myGrid.setColumnHidden(myGrid.getColIndexById("zoneType"),true);	//컬럼 아이디로 해당 컬럼 가리기
					myGrid.setColumnHidden(myGrid.getColIndexById("zoneCd"),true);	//컬럼 아이디로 해당 컬럼 가리기
					myGrid.setColumnHidden(myGrid.getColIndexById("agntCd"),true);	//컬럼 아이디로 해당 컬럼 가리기
					myGrid.setColumnHidden(myGrid.getColIndexById("soType"),true);	//컬럼 아이디로 해당 컬럼 가리기
					myGrid.setColumnHidden(myGrid.getColIndexById("soStatCd"),true);	//컬럼 아이디로 해당 컬럼 가리기

					
					
					
					

					myGrid.init();		//이걸써야 세팅한 그리드가 표시가 된다
					myGrid.enableSmartRendering(true);	//스마트렌더링기능 가능	//데이터를 많이 구했더라도 제일 처음 에는 화면 크기에 나올수있을만큼만 보여준다. 스크롤을 움직이면 그떄 갖고있던 데이터들을 그려주기 시작한다
					myGrid.enablePreRendering(10);	//20220423 정연호 추가
					fnObj.gridOpen.setWidth();
																								//그래야 진짜 화면에 보이는 높이가 만들어진다
					myGrid.addRow(1,"");	//로우 추가
					myGrid.deleteRow(1);
					
					
					myGrid.enableEditEvents(true,false,false);	//이걸쓰면 로우의 onRowDblClicked 이벤트 때문에 onEditCell 이벤트가 안되는것을 막을수 있다	//클릭, 더블클릭,F2
					myGrid.enableBlockSelection(true);
					myGrid.attachEvent("onKeyPress",fnObj.keyOpen.onKeyPressed);
					
					

				},
				gridSetList : function(capaId)
				{
					myGrid.clearAll(false);
		    	
		    		
		    		 var capaIdForm = new FormData();
		    		 capaIdForm.append("cmpyCd",myComboCmpyCd.getSelectedValue());
		    		 capaIdForm.append("capaId",capaId);
		    		 
		    		 
		    		 for (var pair of capaIdForm.entries()) 
						{ 
							console.log(pair[0]+ ' ==> ' + pair[1]);
						}
		    		 
		    		 

		    		$.ajax({
		    	        url: "/erp202001p2List",
		    	        processData : false,
		    			contentType : false,
		    	        data: capaIdForm,
		    	        type:"POST",
		    	        datatype:"json",

		    	        success : function(res){
		    	        	if(res)	
		    	        	{	
		    	        		var columns = myGrid.getColumnCount()
		    	        		for(var i=0;i<res.length;i++)
		    	        		{
	    	            			var jsonData = {};
	    	            			for (var c=0; c<columns; c++)
	    	            			{ 
	   	            					jsonData[myGrid.getColumnId(c)] = res[i][myGrid.getColumnId(c)];
	    	                		}
	    	            			myGrid.addRow(i+1,"");	//로우 추가	//로우는 1부터 시작해야함. 0부터 시작하면 안됨. 그래서 i 에 1을 더함
	    	            			myGrid.setRowData(i+1,jsonData);
		    	        		}
		    	        		
		    	        		myGrid.forEachRow(function(rId){
    	            				myGrid.cellById(rId,myGrid.getColIndexById("totCapa")).setBgColor("yellow");
    	            				myGrid.cellById(rId,myGrid.getColIndexById("acptEr")).setBgColor("yellow");
		    					});
		    	        	}
		    	        	else	
		    	        	{
		    	        		alert("조회 실패");
		    	        	}
		    	        },
		    	        error : function(res) {
		    	        	alert("조회 로직 수행 실패");
		    			}
		    		});
				},
				
				
				setWidth : function(){

				

					myGrid.enableAutoWidth(true,(innerWidth-30),100);
					myGrid.enableAutoHeight(true,innerHeight-110);	//그리드 자동높이
					
					

					
				},	//END of setWidth
			},	//END of gridOpen
			btnOpen:{

				
				clndClose : function(){
					parent.myWins.window(/*[[${sendObject.windowId}]]*/).close();
				},
			},
			keyOpen : {
				enterKey : function(enterType){
					 if (window.event.keyCode == 13) {
						
						 if(enterType == 'srchName')
						{
							 $("#srchName").blur();
							 $("#srchCode").blur();
							 
							
							 $("#srchCode").val("");
			            	fnObj.winOpen.commSrch('화주','A','AGENCY','text');
						}
						
			        }
				},
				onKeyPressed : function (code,ctrl,shift){
				    if(code==67&&ctrl){
				        myGrid.setCSVDelimiter("\t");
				        myGrid.copyBlockToClipboard()
				    }
				    if(code==86&&ctrl){
				        myGrid.pasteBlockFromClipboard()
				    }
				    return true;
				},
			},

	};//END of fnObj
	
	
	
	

	
	$(document).ready(function() {
		console.log(pageUrl());

		
		var sendObj = /*[[${sendObject}]]*/

		fnObj.comboOpen.comboCmpyCd();	//회사콤보 바인드

	
	myGrid = new dhtmlXGridObject('grid');	//그리드

	
	fnObj.gridOpen.grid()

	fnObj.gridOpen.gridSetList(sendObj.capaId)
	
	
	
	window.onresize = function(event) {		//윈도우의 사이즈가 변경했을떄
		fnObj.gridOpen.setWidth();
		fnObj.gridOpen.setWidth();
	};
	
	
	});

	

</script>
