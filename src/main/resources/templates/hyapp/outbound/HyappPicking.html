<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>피킹 리스트</title>

    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --secondary: #f9a825;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #212529;
            --muted: #6c757d;
            --border: #dee2e6;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            padding: 14px 16px;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);
        }

        .app-bar .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -.2px;
        }

        .subtitle {
            font-size: 12px;
            opacity: .9;
            margin-top: 2px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: rgba(255,255,255,.16);
            border: 1px solid rgba(255,255,255,.22);
            border-radius: 999px;
            font-size: 12px;
            white-space: nowrap;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 16px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 14px;
        }

        .panel h2 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: var(--muted);
            font-weight: 800;
            letter-spacing: -.1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 10px;
        }

        .field { grid-column: span 12; }
        @media (min-width: 720px) {
            .field.sm-3 { grid-column: span 3; }
            .field.sm-4 { grid-column: span 4; }
            .field.sm-6 { grid-column: span 6; }
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin: 0 0 6px 2px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 10px 11px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            color: var(--text);
            outline: none;
        }
        input:focus {
            border-color: rgba(46,125,50,.45);
            box-shadow: 0 0 0 3px rgba(46,125,50,.12);
        }

        .btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .05s ease-in-out, opacity .15s ease-in-out;
        }
        .btn:active { transform: translateY(1px); }

        .btn.primary {
            background: var(--primary);
            color: #fff;
        }
        .btn.ghost {
            background: #fff;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 18px 0 10px;
        }
        .section-title h3 {
            margin: 0;
            font-size: 14px;
            color: var(--muted);
            font-weight: 900;
        }
        .count {
            font-size: 12px;
            color: var(--muted);
            background: #fff;
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 999px;
        }

        .list { display: grid; gap: 10px; }

        .card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.06);
        }

        .card .top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
        }

        .so {
            font-weight: 900;
            font-size: 16px;
            letter-spacing: -.2px;
        }

        .badge {
            font-size: 12px;
            font-weight: 900;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            white-space: nowrap;
        }

        .meta {
            margin-top: 8px;
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 12px;
        }

        .meta b { color: var(--text); }

        .empty {
            text-align: center;
            color: var(--muted);
            padding: 22px 10px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: rgba(255,255,255,.7);
        }

        .error {
            background: #fff;
            border: 1px solid #f0b4b4;
            color: #b42318;
            border-radius: 12px;
            padding: 12px;
        }
    </style>
</head>

<body>
<header class="app-bar">
    <div class="row">
        <div>
            <div class="title">피킹 리스트</div>
            <div class="subtitle">배송 확정 내역 기준으로 피킹 대상 조회</div>
        </div>
        <div class="chip" id="chipInfo">DC: -</div>
    </div>
</header>

<main class="container">
    <section class="panel">
        <h2>검색 조건</h2>

        <div class="grid">
            <div class="field sm-3">
                <label for="dcCd">물류센터(DC)</label>
                <input id="dcCd" type="text" placeholder="예: 1000" value="1000"/>
            </div>

            <div class="field sm-3">
                <label for="fromDt">배송확정일(From)</label>
                <input id="fromDt" type="date"/>
            </div>

            <div class="field sm-3">
                <label for="toDt">배송확정일(To)</label>
                <input id="toDt" type="date"/>
            </div>

            <div class="field sm-3">
                <label for="soNo">주문번호(선택)</label>
                <input id="soNo" type="text" placeholder="예: 2112200579"/>
            </div>
        </div>

        <div class="btns">
            <button class="btn primary" id="btnSearch" type="button">조회</button>
            <button class="btn ghost" id="btnReset" type="button">초기화</button>
        </div>

        <div style="margin-top:10px; font-size:12px; color: var(--muted);">
            ※ 화면은 <b>HyappPut</b>과 동일한 톤(밝은 배경/카드형 리스트)으로 구성했습니다.
        </div>
    </section>

    <div class="section-title">
        <h3>피킹 대상</h3>
        <div class="count" id="count">0건</div>
    </div>

    <div id="msg"></div>
    <section class="list" id="list"></section>
</main>

<script>
    const STORAGE_KEY = 'hyapp_picking_search_v1';
    const CMPY_CD = 'A';

    const $ = (id) => document.getElementById(id);

    function ymdToDash(ymd) {
        if (!ymd) return '';
        const s = String(ymd);
        if (s.includes('-')) return s;
        if (s.length !== 8) return s;
        return `${s.substring(0,4)}-${s.substring(4,6)}-${s.substring(6,8)}`;
    }

    function dashToYmd(d) {
        if (!d) return '';
        return String(d).replace(/-/g, '');
    }

    function setTodayRange() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const today = `${yyyy}-${mm}-${dd}`;
        $('fromDt').value = today;
        $('toDt').value = today;
    }

    function loadSaved() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return false;
            const s = JSON.parse(raw);
            if (s.dcCd) $('dcCd').value = s.dcCd;
            if (s.fromDt) $('fromDt').value = ymdToDash(s.fromDt);
            if (s.toDt) $('toDt').value = ymdToDash(s.toDt);
            if (s.soNo) $('soNo').value = s.soNo;
            return true;
        } catch (e) {
            return false;
        }
    }

    function saveCurrent() {
        const payload = {
            dcCd: $('dcCd').value.trim(),
            fromDt: dashToYmd($('fromDt').value),
            toDt: dashToYmd($('toDt').value),
            soNo: $('soNo').value.trim()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function setChip() {
        const dc = $('dcCd').value.trim() || '-';
        const from = $('fromDt').value || '-';
        const to = $('toDt').value || '-';
        $('chipInfo').textContent = `DC: ${dc} · ${from} ~ ${to}`;
    }

    function renderEmpty() {
        $('list').innerHTML = `<div class="empty">조회 결과가 없습니다.</div>`;
    }

    function renderError(text) {
        $('msg').innerHTML = `<div class="error">${text}</div>`;
    }

    function escapeHtml(str) {
        return String(str ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function normalizeList(data) {
        if (!data) return [];
        if (Array.isArray(data)) return data;
        // {data: [...]} 형태도 허용
        if (Array.isArray(data.data)) return data.data;
        return [];
    }

    function formatDate(ymd) {
        const d = ymdToDash(ymd);
        return d || '-';
    }

    function toInt(v) {
        const n = Number(v);
        return Number.isFinite(n) ? n : 0;
    }

    function renderList(rows) {
        $('msg').innerHTML = '';
        if (!rows.length) {
            $('count').textContent = '0건';
            renderEmpty();
            return;
        }

        $('count').textContent = `${rows.length}건`;
        $('list').innerHTML = rows.map((r) => {
            const soNo = escapeHtml(r.soNo || r.SO_NO || '');
            const agntNm = escapeHtml(r.agntNm || r.AGNT_NM || '');
            const addr = escapeHtml(r.smplAddr || r.addr1 || r.ADDR1 || '');
            const addr2 = escapeHtml(r.addr2 || r.ADDR2 || '');
            const postCd = escapeHtml(r.postCd || r.POST_CD || '');
            const qty = toInt(r.qty ?? r.QTY);
            const dlvy = formatDate(r.dlvyCnfmDt || r.DLVY_CNFM_DT);
            const msg = escapeHtml(r.dlvyRqstMsg || r.DLVY_RQST_MSG || '');

            return `
                <div class="card">
                    <div class="top">
                        <div class="so">${soNo}</div>
                        <div class="badge">수량 ${qty}</div>
                    </div>
                    <div class="meta">
                        <div><b>배송확정일</b> ${dlvy}</div>
                        <div><b>거래처</b> ${agntNm || '-'} </div>
                        <div><b>주소</b> ${postCd ? '(' + postCd + ') ' : ''}${addr}${addr2 ? ' ' + addr2 : ''}</div>
                        ${msg ? `<div><b>요청</b> ${msg}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    async function fetchList() {
        const dcCd = $('dcCd').value.trim();
        const fromDt = $('fromDt').value;
        const toDt = $('toDt').value;
        const soNo = $('soNo').value.trim();

        setChip();
        saveCurrent();

        $('msg').innerHTML = '';
        $('list').innerHTML = `<div class="empty">조회 중...</div>`;

        const params = new URLSearchParams({
            cmpyCd: CMPY_CD,
            dcCd: dcCd,
            fromDt: fromDt,
            toDt: toDt
        });

        // 서버가 soNo 필터를 지원하면 활용 (지원하지 않으면 프론트에서 후처리)
        if (soNo) params.set('soNo', soNo);

        try {
            const res = await fetch(`/hyapp/api/outbound/pick/list?${params.toString()}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });

            if (!res.ok) {
                renderError(`조회 실패: HTTP ${res.status}`);
                renderEmpty();
                return;
            }

            const json = await res.json();
            let rows = normalizeList(json);

            // 서버에서 soNo 필터가 안 되면 프론트에서 처리
            if (soNo) {
                rows = rows.filter(r => String(r.soNo || r.SO_NO || '').includes(soNo));
            }

            renderList(rows);
        } catch (e) {
            console.error(e);
            renderError('조회 중 오류가 발생했습니다. (네트워크/서버 확인)');
            renderEmpty();
        }
    }

    function reset() {
        $('dcCd').value = '1000';
        $('soNo').value = '';
        setTodayRange();
        setChip();
        localStorage.removeItem(STORAGE_KEY);
        renderEmpty();
        $('count').textContent = '0건';
        $('msg').innerHTML = '';
    }

    $('btnSearch').addEventListener('click', fetchList);
    $('btnReset').addEventListener('click', reset);

    // init
    const loaded = loadSaved();
    if (!loaded) setTodayRange();
    setChip();
    renderEmpty();
    // 화면 진입 시 바로 조회(기존 검색 조건 유지)
    fetchList();
</script>
</body>
</html>
