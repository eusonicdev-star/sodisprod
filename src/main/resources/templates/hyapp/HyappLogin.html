<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>sodisW 로그인</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f9fafb);
        }

        .login-box {
            width: 380px;
            padding: 32px 28px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
        }

        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-sub {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.4);
        }

        .login-btn {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            border-radius: 999px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            cursor: pointer;
        }

        .error-box {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            background: #fef2f2;
            color: #b91c1c;
            font-size: 13px;
            text-align: center;
            border: 1px solid #fecaca;
        }

        .footer {
            margin-top: 18px;
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="login-title">sodisW 로그인</div>
    <div class="login-sub">사내 계정으로 로그인하세요</div>

    <!-- ✅ 반드시 /loginRe 로 POST -->
    <form th:action="@{/loginRe}" method="post">

        <!-- ✅ 기존 보안 로직 필수 값 -->
        <input type="hidden" name="cmpyCd" value="A">

        <!-- ✅ hyapp 로그인 구분용 -->
        <input type="hidden" name="system" value="hyapp">

        <div class="form-group">
            <label for="loginId">아이디</label>
            <input id="loginId"
                   type="text"
                   name="loginId"
                   placeholder="아이디를 입력하세요"
                   required>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input id="password"
                   type="password"
                   name="password"
                   placeholder="비밀번호를 입력하세요"
                   required>
        </div>

        <!-- ✅ 로그인 실패 메시지 -->
        <div th:if="${param.error}" class="error-box">
            <span th:if="${param.error == 'true'}">아이디 또는 비밀번호를 확인하세요.</span>
            <span th:if="${param.error == 'cmpyCd'}">회사 코드가 올바르지 않습니다.</span>
            <span th:if="${param.error == 'userInfo'}">사용자 정보를 찾을 수 없습니다.</span>
            <span th:if="${param.error == 'loginH'}">로그인 처리 중 오류가 발생했습니다.</span>
        </div>

        <button type="submit" class="login-btn">로그인</button>
    </form>

    <div class="footer">
        ⓒ sodisW · 계정 정보는 외부에 공유하지 마세요
    </div>
</div>

</body>
</html>
