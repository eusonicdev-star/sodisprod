<!DOCTYPE html>
<html

  <head>

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.dhtmlx.com/edge/fonts/font_roboto/roboto.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.dhtmlx.com/edge/fonts/font_awesome/css/font-awesome.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.dhtmlx.com/edge/skins/web/dhtmlx.css"
    />
    <link rel="stylesheet" type="text/css" href="/css/common.css" />
    <link rel="stylesheet" type="text/css" href="/css/erp-style.css" />
    <link rel="stylesheet" type="text/css" href="/css/erp105003.css" />
    <script
      src="https://cdn.dhtmlx.com/edge/dhtmlx.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://code.jquery.com/jquery-3.6.0.min.js"
      integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
      crossorigin="anonymous"
    ></script>
    <script type="text/javascript" src="/js/common.js"></script>
    <script type="text/javascript" src="/js/commCode.js"></script>
    <script type="text/javascript" src="/js/erp105003.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.14.3/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>

    <script th:inline="javascript">
      // Thymeleaf 변수 초기화
      pagePerRow = /*[[${@environment.getProperty('common.html.pagePerRow')}]]*/ 10;

      // 세션 변수 초기화
      $(document).ready(function () {
        initializeSessionVariables(
          /*[[${session.cmpyCd}]]*/ "A",
          /*[[${session.userId}]]*/ "admin"
        );

        // 페이지 초기화
        fnObj.initializePage();

        // 날짜 유효성 검증 및 기본값 설정
        setupDateValidation();
      });

      // 날짜 유효성 검증 및 기본값 설정 함수
      function setupDateValidation() {
        // 오늘 날짜 설정
        var today = new Date();
        var year = today.getFullYear();
        var month = String(today.getMonth() + 1).padStart(2, "0");
        var day = String(today.getDate()).padStart(2, "0");
        var todayStr = year + "-" + month + "-" + day;

        // 기본 날짜 설정
        $("#dateFrom").val(todayStr);
        $("#dateTo").val(todayStr);
        $("#historyDateFrom").val(todayStr);
        $("#historyDateTo").val(todayStr);

        // 날짜 유효성 검증 함수
        function validateDateRange(startDateId, endDateId) {
          var startDate = new Date($("#" + startDateId).val());
          var endDate = new Date($("#" + endDateId).val());

          if (startDate && endDate && startDate > endDate) {
            alert("시작일은 종료일보다 늦을 수 없습니다.");
            $("#" + endDateId).val($("#" + startDateId).val());
          }
        }

        // 날짜 변경 시 유효성 검증
        $("#dateFrom").on("change", function () {
          validateDateRange("dateFrom", "dateTo");
        });

        $("#dateTo").on("change", function () {
          validateDateRange("dateFrom", "dateTo");
        });

        $("#historyDateFrom").on("change", function () {
          validateDateRange("historyDateFrom", "historyDateTo");
        });

        $("#historyDateTo").on("change", function () {
          validateDateRange("historyDateFrom", "historyDateTo");
        });
      }
    </script>
  </head>

  <body>
    <div id="mainDiv">
      <div id="searchDiv">
        <div id="btnDiv1">
          <span class="title-container">
            <span class="item-heade title-text">입고 완료 처리</span>
            <span class="sub-title">erp105003</span>
          </span>
        </div>
      </div>

      <!-- 탭 컨테이너 -->
      <div class="tab-container">
        <button
          id="pendingTab"
          class="tab-button active"
          onclick="fnObj.tabOpen.showPendingTab()"
        >
          입고 예정 목록
        </button>
        <button
          id="historyTab"
          class="tab-button"
          onclick="fnObj.tabOpen.showHistoryTab()"
        >
          입고 완료 내역
        </button>
      </div>

      <!-- 입고 예정 목록 탭 -->
      <div id="pendingContent" class="tab-content active">
        <!-- 검색 섹션 -->
        <div class="search-section">
          <div class="search-row">
            <div class="search-group date-range-group">
              <label>예정일자</label>
              <div class="date-range-container">
                <input type="date" id="dateFrom" />
                <span class="date-separator">~</span>
                <input type="date" id="dateTo" />
              </div>
            </div>
            <div class="search-group">
              <label>화주사</label>
              <div class="input-group">
                <input
                  type="text"
                  id="agntNm"
                  placeholder="화주사명을 입력하세요"
                  onkeypress="fnObj.handleAgntNmKeypress(event)"
                />
                <button
                  class="search-icon"
                  onclick="fnObj.winOpen.commSrch('화주','A','AGENCY','text')"
                >
                  <i class="fa fa-search"></i>
                </button>
              </div>
            </div>
            <div class="search-group">
              <label>화주사코드</label>
              <div class="input-group">
                <input
                  type="text"
                  id="agntCd"
                  placeholder="화주사코드"
                  readonly
                />
                <button class="delete-icon" onclick="fnObj.delAgntCode()">
                  <i class="fa fa-times"></i>
                </button>
              </div>
            </div>
            <div class="search-group">
              <label>상품</label>
              <div class="input-group">
                <input
                  type="text"
                  id="productNm"
                  placeholder="상품명을 입력하세요"
                  onkeypress="fnObj.handleProductNmKeypress(event)"
                />
                <button
                  class="search-icon"
                  onclick="fnObj.winOpen.prodCommSrch('상품','A','MTRL_SO','text')"
                >
                  <i class="fa fa-search"></i>
                </button>
              </div>
            </div>
            <div class="search-group">
              <label>상품코드</label>
              <div class="input-group">
                <input
                  type="text"
                  id="productCd"
                  placeholder="상품코드"
                  readonly
                />
                <button class="delete-icon" onclick="fnObj.delProductCode()">
                  <i class="fa fa-times"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="search-row">
            <div class="search-group button-group">
              <button
                class="btn btn-primary"
                onclick="fnObj.loadPendingInboundList()"
              >
                <i class="fa fa-search"></i> 조회
              </button>
              <button
                class="btn btn-success"
                onclick="fnObj.completeSelectedInbound()"
                id="completeSelectedBtn"
                style="display: none"
              >
                <i class="fa fa-check"></i> 선택 완료 처리
              </button>
              <button
                class="btn btn-secondary"
                onclick="fnObj.clearSearchForm()"
              >
                <i class="fa fa-refresh"></i> 초기화
              </button>
            </div>
          </div>
        </div>

        <!-- 입고 예정 목록 테이블 -->
        <div class="table-container">
          <div class="table-header">입고 예정 목록</div>
          <table class="data-table" id="pendingInboundTable">
            <thead>
              <tr>
                <th>
                  <input
                    type="checkbox"
                    id="selectAllCheckbox"
                    onchange="fnObj.toggleSelectAll()"
                  />
                </th>
                <th>화주사명</th>
                <th>상품코드</th>
                <th>상품명</th>
                <th>예정수량</th>
                <th>예정일</th>
                <th>등록일</th>
                <th>실제수량</th>
                <th>실제일자</th>
                <th>비고</th>
                <th>완료처리</th>
              </tr>
            </thead>
            <tbody id="pendingInboundList">
              <!-- 입고 예정 목록이 여기에 동적으로 로드됩니다 -->
            </tbody>
          </table>
        </div>

        <!-- 입고 예정 목록 페이징 -->
        <div class="pagination-container">
          <div class="pagination-info">
            <span id="paginationInfo">총 0건</span>
          </div>
          <div class="pagination">
            <button
              class="pagination-btn"
              id="prevBtn"
              onclick="fnObj.goToPage(fnObj.currentPage - 1)"
            >
              <i class="fa fa-chevron-left"></i>
            </button>
            <div class="page-numbers" id="pageNumbers">
              <!-- 페이지 번호가 여기에 동적으로 생성됩니다 -->
            </div>
            <button
              class="pagination-btn"
              id="nextBtn"
              onclick="fnObj.goToPage(fnObj.currentPage + 1)"
            >
              <i class="fa fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- 입고 내역 탭 -->
      <div id="historyContent" class="tab-content">
        <!-- 검색 섹션 -->
        <div class="search-section">
          <div class="search-row">
            <div class="search-group date-range-group">
              <label>등록일자</label>
              <div class="date-range-container">
                <input type="date" id="historyDateFrom" />
                <span class="date-separator">~</span>
                <input type="date" id="historyDateTo" />
              </div>
            </div>
            <div class="search-group">
              <label>화주사</label>
              <div class="input-group">
                <input
                  type="text"
                  id="historyAgntNm"
                  placeholder="화주사명을 입력하세요"
                  onkeypress="fnObj.handleHistoryAgntNmKeypress(event)"
                />
                <button
                  class="search-icon"
                  onclick="fnObj.winOpen.historyCommSrch('화주','A','AGENCY','text')"
                >
                  <i class="fa fa-search"></i>
                </button>
              </div>
            </div>
            <div class="search-group">
              <label>화주사코드</label>
              <div class="input-group">
                <input
                  type="text"
                  id="historyAgntCd"

                />
                <button

                  onclick="fnObj.delHistoryAgntCode()"

                  <i class="fa fa-times"></i>
                </button>
              </div>
            </div>
            <div class="search-group">
              <label>상품</label>
              <div class="input-group">
                <input
                  type="text"
                  id="historyProductNm"

                  onkeypress="fnObj.handleHistoryProductNmKeypress(event)"

              </div>
            </div>
            <div class="search-group">
              <label>상품코드</label>

                  type="text"
                  id="historyProductCd"
                  placeholder="상품코드"

          </div>
          <div class="search-row">
            <div class="search-group button-group">
              <button

                onclick="fnObj.loadInboundHistory()"

        <!-- 입고 완료 내역 테이블 -->
        <div class="table-container">
          <div class="table-header">입고 완료 내역</div>
          <table class="data-table" id="inboundHistoryTable">
            <thead>
              <tr>
                <th>화주사명</th>
                <th>상품코드</th>
                <th>상품명</th>
                <th>예정수량</th>
                <th>예정일</th>
                <th>등록일</th>
                <th>상태</th>
                <th>실제수량</th>
                <th>실제일자</th>
                <th>비고</th>
                <th>완료자</th>
                <th>완료일시</th>
              </tr>
            </thead>
            <tbody id="inboundHistoryList">
              <!-- 입고 내역이 여기에 동적으로 로드됩니다 -->
            </tbody>
          </table>
        </div>

        <!-- 입고 완료 내역 페이징 -->
        <div class="pagination-container">
          <div class="pagination-info">
            <span id="historyPaginationInfo">총 0건</span>
          </div>
          <div class="pagination">
            <button
              class="pagination-btn"
              id="historyPrevBtn"
              onclick="fnObj.goToHistoryPage(fnObj.currentPage - 1)"
            >
              <i class="fa fa-chevron-left"></i>
            </button>
            <div class="page-numbers" id="historyPageNumbers">
              <!-- 페이지 번호가 여기에 동적으로 생성됩니다 -->
            </div>

              class="pagination-btn"
              id="historyNextBtn"
              onclick="fnObj.goToHistoryPage(fnObj.currentPage + 1)"
            >

</html>
