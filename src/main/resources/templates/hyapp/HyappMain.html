<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HyApp 메인</title>

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --border:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --radius:20px;
      --shadow:0 8px 20px rgba(0,0,0,.08);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family: system-ui, -apple-system,
      "Apple SD Gothic Neo","Noto Sans KR", sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      max-width:520px;
      margin:0 auto;
      min-height:100%;
      padding:16px;
    }

    header{
      margin-bottom:22px;
    }

    header h1{
      margin:0;
      font-size:20px;
      font-weight:700;
    }

    header p{
      margin:6px 0 0;
      font-size:14px;
      color:var(--muted);
    }

    /* 2x2 버튼 */
    .menu-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .menu-btn{
      height:160px;              /* ? 버튼 높이 */
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;            /* ? 글자 크게 */
      font-weight:800;           /* ? 더 굵게 */
      letter-spacing:1px;        /* 가독성 */
      cursor:pointer;
      transition:transform .08s ease, box-shadow .08s ease;
    }

    .menu-btn:active{
      transform:scale(.96);
      box-shadow:0 4px 10px rgba(0,0,0,.12);
    }

    /* 버튼별 색상 */
    .in   { color:#16a34a; }  /* 입고 */
    .out  { color:#dc2626; }  /* 출고 */
    .move { color:#2563eb; }  /* 재고이동 */
    .re   { color:#d97706; }  /* 재입고 */
    .inv { color:#7c3aed; }  /* 재고조회 (보라색) */
  </style>
</head>
<body>

<div class="app">
  <header>
    <h1>HyApp 메인</h1>
    <p>작업을 선택하세요</p>
  </header>

  <div class="menu-grid">
    <button class="menu-btn in"   onclick="go('in')">입고 검수</button>
    <button class="menu-btn put"  onclick="go('put')">적치</button>
    <button class="menu-btn out"  onclick="go('out')">출고</button>
    <button class="menu-btn move" onclick="go('move')">재고이동</button>
    <button class="menu-btn re"   onclick="go('re')">재입고</button>
    <button class="menu-btn inv"  onclick="go('inv')">재고조회</button>
  </div>
</div>

<script>
  function go(type){
    switch(type){
      case 'in':   location.href='/hyapp/in'; break;
      case 'put':  location.href='/hyapp/put'; break; // 적치
      case 'out':  location.href='/hyapp/out'; break;
      case 'move': location.href='/hyapp/move'; break;
      case 're':   location.href='/hyapp/re'; break;
      case 'inv': location.href='/hyapp/inv'; break;
    }
  }
</script>

</body>
</html>
