<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>입고 검수 - 바코드 조회 (HyappInboundBarcode)</title>
  <style>
    :root { --bg:#f7f7f7; --card:#fff; --border:#e8e8e8; --text:#111; --sub:#666; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); }
    header { position: sticky; top:0; background:#fff; border-bottom:1px solid #e5e5e5; padding:12px 16px; z-index:10; }
    h1 { margin:0; font-size:16px; }
    main { padding:16px; padding-bottom:24px; }

    .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin:10px 0; box-shadow: 0 1px 0 rgba(0,0,0,0.02); }
    .title { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .badge { font-size:12px; padding:2px 8px; border:1px solid #ddd; border-radius:999px; color:#333; background:#fafafa; }

    .row { display:flex; gap:10px; align-items:center; margin-top:10px; }
    .row.tight { margin-top:0; }

    .input {
      width:100%;
      padding:12px; border:1px solid #ddd; border-radius:10px; background:#fff;
      font-size:16px; height:44px; box-sizing:border-box;
    }
    /* 요청: 합격=파란색, 불합격=노란색 */
    .input.pass { background:#dbeafe; border-color:#93c5fd; }
    .input.fail { background:#fef9c3; border-color:#facc15; }

    .btn {
      padding:12px 14px; border:1px solid #ddd; border-radius:10px; background:#fff;
      font-size:16px; cursor:pointer; height:44px; box-sizing:border-box;
      white-space:nowrap;
    }
    .btn.dark { background:#111; color:#fff; border-color:#111; }
    .btn:disabled { opacity:.55; cursor:not-allowed; }

    .hint { margin:10px 2px 0; font-size:12px; color:#6b7280; line-height:1.35; }
    .status { margin:12px 2px 10px; font-size:13px; color:#111; min-height:18px; }
    .muted { color:var(--sub); font-size:12px; }

    .meta { margin-top:10px; font-size:14px; color:#333; display:grid; gap:8px; }
    .meta div { display:flex; justify-content:space-between; gap:10px; }
    .meta span { color:var(--sub); }

    .list-card {
      background:#fff;
      border:1px solid #eaeaea;
      border-radius:14px;
      padding:14px;
      margin:10px 0;
      box-shadow: 0 2px 10px rgba(0,0,0,.03);
      cursor:pointer;
    }
    .list-card.selected { outline: 2px solid #111; border-color:#111; }

    pre { white-space: pre-wrap; word-break: break-word; margin:0; }
  </style>
</head>

<body>
<header>
  <h1>입고 검수 - 바코드 조회</h1>
</header>

<main>
  <!-- ? 선택된 TBL_INBOUND_PRODUCT_ID 보관 -->
  <input type="hidden" id="tblInboundProductIdHidden" value="" />
  <!-- 바코드 입력/스캔 -->
  <div class="row tight">
    <input id="barcodeInput"
           class="input"
           type="text"
           inputmode="numeric"
           autocomplete="off"
           placeholder="바코드(상품코드)를 입력 또는 스캔하세요" />
    <button id="scanBtn" class="btn dark" type="button">스캔</button>
  </div>

  <div class="hint">
    ? 스캔 완료 시 자동으로 조회됩니다.<br/>
    ? 외부 스캐너(키보드) 사용 시 Enter를 누르면 즉시 조회합니다.
  </div>

  <div id="status" class="status"></div>

  <!-- 선택된 입고 예정 정보 -->
  <div id="selectedCard" class="card" style="display:none;">
    <div class="title">
      <div><b id="mtrlNm">-</b></div>
      <span class="badge">입고예정</span>
    </div>
    <div class="meta">
      <div><span>고객명</span><b id="custNm">-</b></div>
      <div><span>상품코드</span><b id="mtrlCd">-</b></div>
      <div><span>상품명</span><b id="mtrlNm2">-</b></div>
      <div><span>예정수량</span><b id="planQty">-</b></div>
    </div>
  </div>

  <!-- 검수 입력 -->
  <div class="card">
    <div style="font-weight:600;">검수 입력</div>
    <div class="muted" style="margin-top:6px;">* 예정수량 기준으로 합격/불합격 수량 합이 자동으로 맞춰집니다.</div>

    <!-- 차량톤수 -->
    <div class="row">
      <select id="vehicleTon" class="input" style="appearance:auto;">
        <option value="">차량톤수 선택</option>
        <option value="1T">1톤</option>
        <option value="3.5T">3.5톤</option>
        <option value="5T">5톤</option>
        <option value="11T">11톤</option>
        <option value="20FT">컨테이너 20FT</option>
        <option value="40FT">컨테이너 40FT</option>
      </select>
    </div>

    <!-- 입고 방법 -->
    <div class="row">
      <select id="inboundMethod" class="input" style="appearance:auto;">
        <option value="">입고 방법 선택</option>
        <option value="BULK">벌크</option>
        <option value="PALLET">파렛트</option>
      </select>
    </div>

    <!-- 파렛트 수량 (파렛트 선택 시만 표시) -->
    <div id="palletQtyWrap" style="display:none; margin-top:10px;">
      <div class="row">
        <input id="palletQty" class="input" type="number" inputmode="numeric" min="1" placeholder="파렛트 수량 (N개)" />
      </div>
    </div>

    <!-- ? 합격/불합격 수량 -->
    <div class="row">
      <input id="passQty" class="input pass" type="number" inputmode="numeric" min="0" placeholder="합격 수량" />
      <input id="failQty" class="input fail" type="number" inputmode="numeric" min="0" placeholder="불합격 수량" />
    </div>

    <div class="row">
      <input id="memo" class="input" type="text" placeholder="메모(선택)" />
    </div>

    <div class="row">
      <button id="confirmBtn" class="btn dark" style="flex:1;">입고 검수 확인</button>
    </div>

    <div class="row">
      <button id="clearFormBtn" class="btn" style="flex:1;">입력 초기화</button>
    </div>
  </div>

  <!-- 입고 예정 상세 목록 -->
  <div class="card">
    <div style="font-weight:600;">입고 예정 상세</div>
    <div class="muted" style="margin-top:6px;">목록에서 다른 건을 탭하면 상단 선택 정보가 즉시 바뀝니다.</div>
    <div id="list" style="margin-top:10px;"></div>
  </div>

  <!-- 디버그(필요시만) -->
  <div id="debugCard" class="card" style="display:none;">
    <div style="font-weight:600;">디버그</div>
    <div class="muted" style="margin-top:6px;">URL에 <b>?debug=1</b> 붙이면 노출됩니다.</div>
    <pre id="debugPre" style="margin-top:10px;"></pre>
  </div>
</main>

<script>
  const barcodeInput = document.getElementById('barcodeInput');
  const scanBtn = document.getElementById('scanBtn');
  const statusEl = document.getElementById('status');
  const listEl = document.getElementById('list');

  const selectedCard = document.getElementById('selectedCard');
  const debugCard = document.getElementById('debugCard');
  const debugPre = document.getElementById('debugPre');

  const elCustNm = document.getElementById('custNm');
  const elMtrlCd = document.getElementById('mtrlCd');
  const elMtrlNm = document.getElementById('mtrlNm');
  const elMtrlNm2 = document.getElementById('mtrlNm2');
  const elPlanQty = document.getElementById('planQty');

  const vehicleTonEl = document.getElementById("vehicleTon");
  const inboundMethodEl = document.getElementById("inboundMethod");
  const palletQtyWrap = document.getElementById("palletQtyWrap");
  const palletQtyEl = document.getElementById("palletQty");

  const passQtyEl = document.getElementById("passQty");
  const failQtyEl = document.getElementById("failQty");
  const memoEl = document.getElementById("memo");

  const confirmBtn = document.getElementById("confirmBtn");
  const clearFormBtn = document.getElementById("clearFormBtn");

  const API_URL = "/hyapp/api/inbound/plan/by-barcode";
  const QC_SAVE_URL = "/hyapp/api/inbound/qc/save";
  //alert(QC_SAVE_URL);
  function setStatus(text) { statusEl.textContent = text || ""; }
  function normalizeBarcode(v) { return String(v ?? "").trim(); }
  function escapeHtml(str) {
    return String(str ?? "")
            .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
            .replaceAll('"',"&quot;").replaceAll("'","&#39;");
  }
  function pick(obj, keys) {
    for (const k of keys) {
      const v = obj?.[k];
      if (v !== undefined && v !== null && String(v) !== "") return v;
    }
    return null;
  }

  // ? 예정수량은 inboundQuantity
  function getPlanQty(it) {
    return pick(it, ["inboundQuantity", "INBOUND_QUANTITY", "qty", "QTY", "planQty", "PLAN_QTY", "inPlanQty", "IN_PLAN_QTY"]);
  }

  function toNonNegInt(v) {
    // 빈 값이면 null로 취급 (자동 계산을 위해)
    if (v === "" || v === null || v === undefined) return null;
    const n = Number(v);
    if (!Number.isFinite(n)) return null;
    const i = Math.floor(n);
    return i < 0 ? 0 : i;
  }

  let selectedItem = null;
  let selectedPlanQty = 0; // 숫자형 예정수량
  let lastReq = 0;

  const debugMode = new URLSearchParams(location.search).get("debug") === "1";
  if (debugMode) debugCard.style.display = "block";
  function setDebug(text) { if (debugMode) debugPre.textContent = text || ""; }

  function togglePalletQty() {
    const isPallet = inboundMethodEl.value === "PALLET";
    palletQtyWrap.style.display = isPallet ? "block" : "none";
    if (!isPallet) palletQtyEl.value = "";
  }

  inboundMethodEl.addEventListener("change", () => { togglePalletQty(); validate(); });
  palletQtyEl.addEventListener("input", validate);
  vehicleTonEl.addEventListener("change", validate);

  // ? 자동 합 맞추기 (예정수량 기준)
  let syncing = false;

  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  function syncByPass() {
    if (syncing) return;
    syncing = true;

    const plan = selectedPlanQty;
    let pass = toNonNegInt(passQtyEl.value);
    if (pass === null) pass = 0;

    pass = clamp(pass, 0, plan);
    const fail = plan - pass;

    passQtyEl.value = String(pass);
    failQtyEl.value = String(fail);

    syncing = false;
    validate();
  }

  function syncByFail() {
    if (syncing) return;
    syncing = true;

    const plan = selectedPlanQty;
    let fail = toNonNegInt(failQtyEl.value);
    if (fail === null) fail = 0;

    fail = clamp(fail, 0, plan);
    const pass = plan - fail;

    failQtyEl.value = String(fail);
    passQtyEl.value = String(pass);

    syncing = false;
    validate();
  }

  passQtyEl.addEventListener("input", syncByPass);
  failQtyEl.addEventListener("input", syncByFail);

  function validate() {
    if (!selectedItem) { confirmBtn.disabled = true; return; }
    if (!vehicleTonEl.value) { confirmBtn.disabled = true; return; }
    if (!inboundMethodEl.value) { confirmBtn.disabled = true; return; }

    if (inboundMethodEl.value === "PALLET") {
      const pq = Number(palletQtyEl.value);
      if (!Number.isFinite(pq) || pq < 1) { confirmBtn.disabled = true; return; }
    }

    // 예정수량이 없으면 저장 막음 (요구사항: 예정수량 기준 자동계산)
    if (!Number.isFinite(selectedPlanQty) || selectedPlanQty <= 0) { confirmBtn.disabled = true; return; }

    const pass = toNonNegInt(passQtyEl.value);
    const fail = toNonNegInt(failQtyEl.value);
    if (pass === null || fail === null) { confirmBtn.disabled = true; return; }

    // ? 항상 합이 예정수량이어야 함
    if ((pass + fail) !== selectedPlanQty) { confirmBtn.disabled = true; return; }

    confirmBtn.disabled = false;
  }

  function resetSelectedView() {
    selectedCard.style.display = "none";
    elCustNm.textContent = "-";
    elMtrlCd.textContent = "-";
    elMtrlNm.textContent = "-";
    elMtrlNm2.textContent = "-";
    elPlanQty.textContent = "-";
  }

  function applySelection(items, idx) {
    selectedItem = items[idx];

    // ? 키값(TBL_INBOUND_PRODUCT_ID) hidden에 저장
    const inboundId = pick(selectedItem, ["tblInboundProductId", "TBL_INBOUND_PRODUCT_ID", "tbl_inbound_product_id"]);
    const inboundIdHiddenEl = document.getElementById("tblInboundProductIdHidden");
    if (inboundIdHiddenEl) inboundIdHiddenEl.value = inboundId ?? "";


    [...listEl.querySelectorAll(".list-card")].forEach(c => c.classList.remove("selected"));
    const card = listEl.querySelector(`.list-card[data-idx="${idx}"]`);
    if (card) card.classList.add("selected");

    const custNm  = pick(selectedItem, ["custNm", "CUST_NM", "agntNm", "AGNT_NM", "clientNm", "CUSTOMER_NM"]);
    const mtrlCd  = pick(selectedItem, ["mtrlCd", "MTRL_CD"]);
    const mtrlNm  = pick(selectedItem, ["mtrlNm", "MTRL_NM"]);
    const qtyRaw  = getPlanQty(selectedItem);

    const qtyNum = Number(qtyRaw);
    selectedPlanQty = (Number.isFinite(qtyNum) && qtyNum >= 0) ? Math.floor(qtyNum) : 0;

    selectedCard.style.display = "block";
    elCustNm.textContent = custNm || "-";
    elMtrlCd.textContent = mtrlCd || "-";
    elMtrlNm.textContent = mtrlNm || "-";
    elMtrlNm2.textContent = mtrlNm || "-";
    elPlanQty.textContent = (qtyRaw ?? "-");

    // 기본: 합격=예정수량, 불합격=0
    passQtyEl.value = selectedPlanQty > 0 ? String(selectedPlanQty) : "";
    failQtyEl.value = selectedPlanQty > 0 ? "0" : "";

    validate();
  }

  function render(items) {
    selectedItem = null;
    selectedPlanQty = 0;
    resetSelectedView();
    validate();

    if (!items || items.length === 0) {
      listEl.innerHTML = `<div class="list-card" style="cursor:default;">조회된 입고 예정 정보가 없습니다.</div>`;
      return;
    }

    listEl.innerHTML = items.map((it, idx) => {
      const custNm  = pick(it, ["custNm", "CUST_NM", "agntNm", "AGNT_NM", "clientNm", "CUSTOMER_NM"]);
      const mtrlCd  = pick(it, ["mtrlCd", "MTRL_CD"]);
      const mtrlNm  = pick(it, ["mtrlNm", "MTRL_NM"]);
      const qty     = getPlanQty(it);

      return `
        <div class="list-card" data-idx="${idx}">
          <div class="title">
            <div><b>${escapeHtml(mtrlNm || "-")}</b></div>
            <span class="badge">입고예정</span>
          </div>
          <div class="meta">
            <div><span>고객명</span><b>${escapeHtml(custNm || "-")}</b></div>
            <div><span>상품코드</span><b>${escapeHtml(mtrlCd || "-")}</b></div>
            <div><span>입고 예정 수량</span><b>${escapeHtml(qty ?? "-")}</b></div>
          </div>
        </div>
      `;
    }).join("");

    listEl.onclick = (e) => {
      const card = e.target.closest(".list-card");
      if (!card || card.dataset.idx === undefined) return;
      applySelection(items, Number(card.dataset.idx));
    };

    applySelection(items, 0);
  }

  async function loadInboundPlanByBarcode(barcodeRaw) {
    const barcode = normalizeBarcode(barcodeRaw);
    if (!barcode) return;

    const reqId = ++lastReq;
    scanBtn.disabled = true;
    setStatus("입고 예정 조회 중...");
    listEl.innerHTML = "";
    resetSelectedView();

    try {
      const url = `${API_URL}?barcode=${encodeURIComponent(barcode)}`;
      const res = await fetch(url, { method: "GET", headers: { "Accept": "application/json" }});
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const items = Array.isArray(data) ? data : (data.items || data.list || []);

      if (reqId !== lastReq) return;
      render(items);
      setStatus(`조회 완료 (바코드: ${barcode}, ${items.length}건)`);
      setDebug(JSON.stringify({ barcode, itemsLen: items.length, sample: items[0] || null }, null, 2));
    } catch (e) {
      if (reqId !== lastReq) return;
      setStatus(`조회 중 오류: ${e.message}`);
      listEl.innerHTML = `<div class="list-card" style="cursor:default;">네트워크/서버 상태를 확인해주세요.</div>`;
      setDebug(String(e));
    } finally {
      if (reqId === lastReq) scanBtn.disabled = false;
      validate();
    }
  }

  let debounceTimer = null;
  barcodeInput.addEventListener("input", () => {
    const v = normalizeBarcode(barcodeInput.value);
    clearTimeout(debounceTimer);
    if (!v) return;
    debounceTimer = setTimeout(() => loadInboundPlanByBarcode(v), 250);
  });

  barcodeInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      loadInboundPlanByBarcode(barcodeInput.value);
    }
  });

  function requestBarcodeScan() {
    if (window.ReactNativeWebView && typeof window.ReactNativeWebView.postMessage === "function") {
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: "requestBarcodeScan" }));
      setStatus("카메라 실행 중...");
      return;
    }
    alert("모바일 앱(WebView)에서만 바코드 스캔이 가능합니다.");
    barcodeInput.focus();
  }
  scanBtn.addEventListener("click", requestBarcodeScan);

  function handleFromNative(raw) {
    try {
      const data = (typeof raw === "string") ? JSON.parse(raw) : raw;
      if (data && data.type === "barcode") {
        const code = normalizeBarcode(data.value);
        if (!code) return;
        barcodeInput.value = code;
        loadInboundPlanByBarcode(code);
      }
    } catch (_) {
      const code = normalizeBarcode(raw);
      if (code) {
        barcodeInput.value = code;
        loadInboundPlanByBarcode(code);
      }
    }
  }
  window.addEventListener("message", (e) => handleFromNative(e.data));
  document.addEventListener("message", (e) => handleFromNative(e.data));

  async function submitQcConfirm() {
    if (!selectedItem) return alert("입고 예정 항목을 선택해주세요.");
    if (!vehicleTonEl.value) return alert("차량톤수를 선택해주세요.");
    if (!inboundMethodEl.value) return alert("입고 방법을 선택해주세요.");
    if (!Number.isFinite(selectedPlanQty) || selectedPlanQty <= 0) return alert("예정수량이 올바르지 않습니다.");

    const inboundIdCheck = (document.getElementById("tblInboundProductIdHidden")?.value) || pick(selectedItem, ["tblInboundProductId", "TBL_INBOUND_PRODUCT_ID", "tbl_inbound_product_id"]);
    if (!inboundIdCheck) return alert("키값(TBL_INBOUND_PRODUCT_ID)이 없습니다. 바코드 조회 API 응답에 ID가 포함되어야 합니다.");

    if (inboundMethodEl.value === "PALLET") {
      const pq = Number(palletQtyEl.value);
      if (!Number.isFinite(pq) || pq < 1) return alert("파렛트 수량(N개)을 입력해주세요.");
    }

    const passQty = toNonNegInt(passQtyEl.value);
    const failQty = toNonNegInt(failQtyEl.value);
    if (passQty === null || failQty === null) return alert("합격/불합격 수량을 확인해주세요.");
    if ((passQty + failQty) !== selectedPlanQty) return alert("합격/불합격 수량 합이 예정수량과 같아야 합니다.");

    const payload = {
      tblInboundProductId: Number((document.getElementById("tblInboundProductIdHidden")?.value) || pick(selectedItem, ["tblInboundProductId", "TBL_INBOUND_PRODUCT_ID", "tbl_inbound_product_id"]) || 0),
      barcode: normalizeBarcode(barcodeInput.value),
      custNm: pick(selectedItem, ["custNm", "CUST_NM", "agntNm", "AGNT_NM", "clientNm", "CUSTOMER_NM"]),
      mtrlCd: pick(selectedItem, ["mtrlCd", "MTRL_CD"]),
      mtrlNm: pick(selectedItem, ["mtrlNm", "MTRL_NM"]),
      inboundQuantity: selectedPlanQty, // ? 예정수량(정수)
      vhclTonType: vehicleTonEl.value || null,
      inMethod: inboundMethodEl.value || null,
      palletQty: inboundMethodEl.value === "PALLET" ? Number(palletQtyEl.value) : null,
      passQty,
      failQty,
      memo: memoEl.value || ""
    };

    try {
      confirmBtn.disabled = true;
      setStatus("검수 저장 중...");
      alert(QC_SAVE_URL);
      const res = await fetch(QC_SAVE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      setStatus("검수 저장 완료");
      alert("입고 검수 확인 완료!");
    } catch (e) {
      console.error(e);
      setStatus(`검수 저장 실패: ${e.message}`);
      alert("검수 저장 API가 아직 없거나 서버 오류입니다. (화면은 정상 구현됨)");
    } finally {
      validate();
    }
  }

  confirmBtn.addEventListener("click", submitQcConfirm);

  clearFormBtn.addEventListener("click", () => {
    vehicleTonEl.value = "";
    inboundMethodEl.value = "";
    palletQtyEl.value = "";
    palletQtyWrap.style.display = "none";
    memoEl.value = "";

    // 선택 유지: 예정수량 기준으로 다시 초기화
    passQtyEl.value = selectedPlanQty > 0 ? String(selectedPlanQty) : "";
    failQtyEl.value = selectedPlanQty > 0 ? "0" : "";

    togglePalletQty();
    validate();
  });

  togglePalletQty();
  validate();
  barcodeInput.focus();
</script>
</body>
</html>
