<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로케이션 관리 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: #f0f2f5; color: #333; }
        .container { padding: 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* 상단 조회 바 */
        .search-area { background: #fff; padding: 15px 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 15px; align-items: center; }
        .search-area select, .search-area input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }

        /* 데이터 그리드 */
        .grid-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid #dee2e6; font-size: 14px; color: #495057; text-align: center; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; text-align: center; }
        tr:hover { background: #f1f3f5; cursor: pointer; }

        .btn { padding: 8px 15px; border-radius: 4px; cursor: pointer; border: 1px solid #ccc; font-size: 13px; transition: 0.2s; }
        .btn-primary { background: #2563eb; color: #fff; border: none; }

        /* 팝업 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: #fff; width: 550px; margin: 100px auto; padding: 25px; border-radius: 12px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-item { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .form-item label { font-size: 12px; font-weight: bold; color: #666; }
        .form-item input, .form-item select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h2>📍 로케이션(Location) 마스터 정보</h2>
        <button class="btn btn-primary" onclick="openModal()">신규 로케이션 추가</button>
    </div>

    <div class="search-area">
        <label>존(Zone):</label>
        <select id="searchZoneId"><option value="">전체 존</option></select>

        <label>피킹여부:</label>
        <select id="searchPickingYn">
            <option value="">전체</option>
            <option value="Y">Y (피킹가능)</option>
            <option value="N">N (피킹불가)</option>
        </select>

        <label>사용여부:</label>
        <select id="searchUseYn">
            <option value="">전체</option>
            <option value="Y">Y (사용중)</option>
            <option value="N">N (미사용)</option>
        </select>

        <input type="text" id="searchLocCd" placeholder="로케이션 코드 입력...">
        <button class="btn btn-primary" onclick="loadData()">조회</button>
    </div>

    <div class="grid-card">
        <table>
            <thead>
            <tr>
                <th>존 코드(명칭)</th>
                <th>로케이션 코드</th>
                <th>로케이션명</th>
                <th>통로(Aisle)</th>
                <th>랙(Rack)</th>
                <th>단(Level)</th>
                <th>피킹여부</th>
                <th>사용여부</th>
                <th>등록일</th>
            </tr>
            </thead>
            <tbody id="dataBody">
            <tr><td colspan="8">데이터를 불러오는 중입니다...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="locModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0">로케이션 상세 관리</h3>
        <hr/>
        <input type="hidden" id="locId">
        <div class="form-grid">
            <div class="form-item"><label>소속 존(Zone)</label><select id="modalZoneId"></select></div>
            <div class="form-item"><label>로케이션 코드</label><input type="text" id="locCd"></div>
            <div class="form-item"><label>로케이션명</label><input type="text" id="locNm"></div>
            <div class="form-item"><label>통로(Aisle)</label><input type="text" id="aisle"></div>
            <div class="form-item"><label>랙(Rack)</label><input type="text" id="rack"></div>
            <div class="form-item"><label>단(Level)</label><input type="text" id="levelNo"></div>
            <div class="form-item"><label>피킹가능 여부</label>
                <select id="pickingYn"><option value="Y">Y (가능)</option><option value="N">N (불가)</option></select>
            </div>
            <div class="form-item"><label>사용 여부</label>
                <select id="useYn">
                    <option value="Y">Y (사용중)</option>
                    <option value="N">N (미사용)</option>
                </select>
            </div>
        </div>
        <div style="text-align: right; margin-top: 25px;">
            <button class="btn" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="saveData()">데이터 저장</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "/api/wh/loc";
    const COMMON_API_URL = "/api/common/wh/zone/list"; // 공통 존 목록 API 경로
    const CMPY_CD = 'A';
    const WH_CD = '1000';

    // 1. 페이지 로드 시 실행
    window.onload = async () => {
        await loadZoneCombo(); // 존 목록 불러오기
    };

    // 2. 존 목록을 불러와서 콤보박스(Select)에 채우기
    async function loadZoneCombo() {
        try {
            const res = await fetch(COMMON_API_URL);
            if (!res.ok) throw new Error("존 목록 로드 실패");

            const zoneList = await res.json();
            const searchCombo = document.getElementById("searchZoneId");
            const modalCombo = document.getElementById("modalZoneId");

            // 검색용: '전체' 옵션 추가
            let searchOptions = '<option value="">전체 존 조회</option>';
            // 모달용: 선택 안내 추가
            let modalOptions = '<option value="">존 선택</option>';

            zoneList.forEach(zone => {
                const opt = `<option value="${zone.zoneId}">${zone.zoneCd} (${zone.zoneNm})</option>`;
                searchOptions += opt;
                modalOptions += opt;
            });

            if (searchCombo) searchCombo.innerHTML = searchOptions;
            if (modalCombo) modalCombo.innerHTML = modalOptions;

            console.log("존 목록 로드 완료");
        } catch (err) {
            console.error("Zone Load Error:", err);
        }
    }

    // 3. 로케이션 데이터 조회 (존 선택 없으면 전체 조회)
    async function loadData() {
        const zoneId = document.getElementById('searchZoneId').value;
        const searchLocCd = document.getElementById('searchLocCd').value;

        try {
            const res = await fetch(`${API_URL}/list`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    cmpyCd: CMPY_CD,
                    whCd: WH_CD,
                    zoneId: zoneId || null, // zoneId가 없으면 null을 보내 전체 조회 유도
                    locCd: searchLocCd
                })
            });

            const list = await res.json();
            renderTable(list);
        } catch (err) {
            console.error(err);
            document.getElementById('dataBody').innerHTML = `<tr><td colspan="8" style="color:red">조회 중 오류가 발생했습니다.</td></tr>`;
        }
    }

    // 4. 테이블 렌더링 (날짜 처리 포함)
    function renderTable(list) {
        const body = document.getElementById('dataBody');
        if (!list || list.length === 0) {
            body.innerHTML = '<tr><td colspan="8">조회된 데이터가 없습니다.</td></tr>';
            return;
        }

        body.innerHTML = list.map(item => {
            // 날짜 안전 처리 (substring 에러 방지)
            let displayDate = '-';
            if (item.saveTime) {
                const d = new Date(item.saveTime);
                displayDate = !isNaN(d) ? d.toISOString().split('T')[0] : '-';
            }

            return `
                <tr onclick='openModal(${JSON.stringify(item)})'>
                    <td><span style="font-weight:bold">${item.zoneCd || ''}</span> <span style="color:#888">(${item.zoneNm || ''})</span></td>
                    <td><b style="color:#2563eb">${item.locCd || ''}</b></td>
                    <td>${item.locNm || '-'}</td>
                    <td>${item.aisle || '-'}</td>
                    <td>${item.rack || '-'}</td>
                    <td>${item.levelNo || '-'}</td>
                    <td>${item.pickingYn || 'Y'}</td>
                    <td>${item.useYn || 'Y'}</td>
                    <td>${displayDate}</td>
                </tr>
            `;
        }).join('');
    }
    // 1. 모달 열기 (신규/수정 공용)
    function openModal(item = null) {
        const modal = document.getElementById('locModal');
        const title = document.getElementById('modalTitle');

        // 필드 초기화
        document.getElementById('locId').value = item ? item.locId : '';
        document.getElementById('modalZoneId').value = item ? item.zoneId : '';
        document.getElementById('locCd').value = item ? item.locCd : '';
        document.getElementById('locNm').value = item ? item.locNm : '';
        document.getElementById('aisle').value = item ? item.aisle : '';
        document.getElementById('rack').value = item ? item.rack : '';
        document.getElementById('levelNo').value = item ? item.levelNo : '';
        document.getElementById('pickingYn').value = item ? item.pickingYn : 'Y';
        document.getElementById('useYn').value = item ? item.useYn : 'Y';

        title.innerText = item ? "📍 로케이션 정보 수정" : "➕ 신규 로케이션 등록";
        modal.style.display = 'block';
    }

    // 2. 모달 닫기
    function closeModal() {
        document.getElementById('locModal').style.display = 'none';
    }

    // 3. 데이터 저장 (신규 등록 및 수정)
    // location.html 수정 부분
    async function saveData() {
        const locId = document.getElementById('locId').value;
        const payload = {
            cmpyCd: CMPY_CD,
            whCd: WH_CD,
            locId: locId ? parseInt(locId) : null, // ID가 있으면 수정, 없으면 등록
            zoneId: document.getElementById('modalZoneId').value,
            locCd: document.getElementById('locCd').value,
            locNm: document.getElementById('locNm').value,
            aisle: document.getElementById('aisle').value,
            rack: document.getElementById('rack').value,
            levelNo: document.getElementById('levelNo').value,
            pickingYn: document.getElementById('pickingYn').value,
            useYn: document.getElementById('useYn').value // 사용여부 추가
        };

        try {
            // Controller의 @PostMapping("/save") 경로와 일치시킴
            const res = await fetch(`${API_URL}/save`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("성공적으로 저장되었습니다.");
                closeModal();
                loadData();
            }
        } catch (err) {
            alert("저장 실패: " + err.message);
        }
    }
</script>
</body>
</html>
