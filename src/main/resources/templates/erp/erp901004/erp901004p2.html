<!DOCTYPE HTML>
<html xmlns:sec="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>상품구성품관리(BOM) 엑셀업로드(erp901004p2)</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" type="text/css" href="https://cdn.dhtmlx.com/edge/fonts/font_roboto/roboto.css">
    <link rel="stylesheet" type="text/css"
          href="https://cdn.dhtmlx.com/edge/fonts/font_awesome/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.dhtmlx.com/edge/skins/terrace/dhtmlx.css">
    <link rel="stylesheet" type="text/css" href="/css/common.css"/>
    <link rel="stylesheet" type="text/css" href="/css/popup.css"/>
    <script src="https://cdn.dhtmlx.com/edge/dhtmlx.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
            integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script type="text/javascript" src="/js/common.js"></script>
    <script type="text/javascript" src="/js/commCode.js"></script>


    <!-- 엑셀 다운로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.14.3/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
    <script th:inline="javascript">
        var srchInput;
        var myGrid;
        var myWins;
        var myCalendarInptdt;
        var myCalendarOutdt;
        var sendObject;
        fnObj = {
            winOpen: {},	//END of winOpen:{
            comboOpen: {
                comboCmpyCd: function () {
                    myComboCmpyCd = new dhtmlXCombo("cmpyCd");
                    comboList(myComboCmpyCd, 'A', 'COMM', 'CMPY_CD', '', 'Y', '');
                    myComboCmpyCd.selectOption(myComboCmpyCd.getIndexByValue(/*[[${session.cmpyCd}]]*/));
                    myComboCmpyCd.setFontSize("12px", "12px");

                    myComboCmpyCd.disable();
                },
            },	//END of comboOpen : {
            gridOpen: {
                grid: function () {
                    myGrid.setImagePath("https://cdn.dhtmlx.com/edge/skins/terrace/imgs/");
                    myGrid.setHeader("화주코드,부모상품코드,순번,자식상품코드,수량,UNIT,사용유무");
                    myGrid.setColumnIds("agntCd,mtrlCd,seq,cmtrlCd,qty,unit,useYn");	//필턴은 공백이 있으면 표시가 안된다
                    myGrid.setInitWidths("120,260,80,260,120,100,100");
                    myGrid.setColAlign("center,center,center,center,center,center,center");
                    myGrid.setColTypes("ro,ro,ro,ro,ro,ro,ro");
                    myGrid.init();		//이걸써야 세팅한 그리드가 표시가 된다
                    myGrid.enableSmartRendering(true);	//스마트렌더링기능 가능	//데이터를 많이 구했더라도 제일 처음 에는 화면 크기에 나올수있을만큼만 보여준다. 스크롤을 움직이면 그떄 갖고있던 데이터들을 그려주기 시작한다
                    myGrid.enablePreRendering(10);	//20220423 정연호 추가


                    fnObj.gridOpen.setWidth();
                    fnObj.gridOpen.setWidth();																//그래야 진짜 화면에 보이는 높이가 만들어진다
                    myGrid.addRow(1, "");	//로우 추가
                    myGrid.deleteRow(1);
                    myGrid.enableEditEvents(true, false, false);	//이걸쓰면 로우의 onRowDblClicked 이벤트 때문에 onEditCell 이벤트가 안되는것을 막을수 있다	//클릭, 더블클릭,F2
                    myGrid.enableBlockSelection(true);
                    myGrid.attachEvent("onKeyPress", fnObj.keyOpen.onKeyPressed);
                    myGrid.attachEvent("onRowDblClicked", function (rId, cInd) {

                    });

                },
                setWidth: function () {
                    c_width = window.innerWidth;
                    searchDiv_height = $("#searchDiv").height();
                    btnDiv1_height = $("#btnDiv1").height();

                    searchDiv1_height = $("#searchDiv1").height();

                    xhdr_height = $(".xhdr").height();


                    myGrid.enableAutoWidth(true, c_width - 25, 100);
                    myGrid.enableAutoHeight(true, window.innerHeight - searchDiv_height - xhdr_height - 30);	//그리드 자동높이


                    $("#searchDiv").width(c_width - 25);

                },	//END of setWidth
            },		//ENd of gridOpen : {
            searchOpen: {
                exclUpload: function () {	//일괄 업로드
                    $("#fileUpload").val("");

                    fnObj.searchOpen.excelUploadJson(excelUploadData);
                },


                excelUploadJson: function (uploadData) {	//엑셀을 json으로 바꾼걸 table 에 insert

                    if (uploadData.length == 0) {
                        alert("업로드할 주문 데이터가 없습니다.");
                        return;
                    }

                    if (!confirm("엑셀파일의 주문내용을 업로드 하시겠습니까?")) {
                        //alert("취소하였습니다.");
                        return;
                    }

                    $.ajax({
                        url: "/erp901004p2ExcelUploadJson",
                        processData: false,
                        contentType: "application/json",
                        data: JSON.stringify(uploadData),
                        type: "POST",
                        datatype: "json",
                        success: function (res) {

                            //console.log(res);
                            if (res) {

                                var rtnY = 0;
                                for (var i = 0; i < res.length; i++) {


                                    if (res[i].rtnYn == "Y")	//원래는 Y 가 아닌 것.
                                    {
                                        rtnY++;
                                        myGrid.deleteRow(parseInt(res[i].exclRow));
                                    }
                                }


                                $(top.document).find('#loader').hide();

                                alert(res.length + "중 " + rtnY + "건 성공. " + (res.length - rtnY) + "건 실패.");
                                parent.myWins.window(/*[[${sendObject.windowId}]]*/).close();
                                //myGrid.clearAll(false);
                                //$("#fileUpload").val("");

                            } else {
                                alert("등록 수행 실패");
                                $(top.document).find('#loader').hide();
                            }
                            $(top.document).find('#loader').hide();
                        },
                    });

                    fnObj.gridOpen.setWidth();
                },	//END of excelUploadJson : function() {

            },		//ENd of searchOpen : {
            keyOpen: {
                enterKey: function (enterType) {
                    if (enterType == "agency") {
                        if (window.event.keyCode == 13) {

                            $("#agencyNm").blur();
                            $("#agencyCd").blur();

                            $("#agencyCd").val("");
                            fnObj.winOpen.commSrch('화주', 'A', 'AGENCY', 'text');

                        }
                    }
                },
            },

        }	//END of fnObj


        //엑셀 다운로드
        //엑셀 헨들러
        var excelHandler = {


            getExcelFileName: function () {
                return '상품구성품관리(BOM) 일괄업로드 양식' + '.xlsx';		//엑셀파일명
            },
            getSheetName: function () {
                return '상품구성품관리(BOM) 일괄업로드';		//시트명
            },
            getExcelData: function () {
                return get_json_for_tmpl(myGrid);
            },
            getWorksheet: function () {
                //myGrid.deleteRow(1);

                //엑셀 다운로드의 셀 타입을 텍스트 형태로 하는 법
                var worksheet = XLSX.utils.json_to_sheet(this.getExcelData());
                var range = XLSX.utils.decode_range(worksheet['!ref']);
                for (var r = range.s.r; r <= range.e.r; r++) {
                    for (var c = range.s.c; c <= range.e.c; c++) {
                        var cellName = XLSX.utils.encode_cell({c: c, r: r});
                        worksheet[cellName].z = '@';
                    }
                }

                return worksheet;
            },
        }

        //그리드 to json  헤더텍스트를 포함하여 표시	//다운로드 할 양식 생성

        function get_json_for_tmpl(myGrid) {

            var rowArr = {};
            var newArr = [];


            rowArr.화주코드 = '8017';
            rowArr.부모상품코드 = '000211';
            rowArr.순번 = '0';
            rowArr.자식상품코드 = '00021';
            rowArr.수량 = '1';
            rowArr.UNIT = 'EA';
            rowArr.사용유무 = 'Y';

            newArr.push(rowArr);
            rowArr = {};
            rowArr.화주코드 = '8017';
            rowArr.부모상품코드 = '000211';
            rowArr.순번 = '0';
            rowArr.자식상품코드 = '00021';
            rowArr.수량 = '1';
            rowArr.UNIT = 'EA';
            rowArr.사용유무 = 'Y';

            newArr.push(rowArr);
            rowArr = {};

            return newArr;
        }

        function exportExcel2() {


            // step 1. workbook 생성
            var wb = XLSX.utils.book_new();

            // step 2. 시트 만들기
            var newWorksheet = excelHandler.getWorksheet();

            // step 3. workbook에 새로만든 워크시트에 이름을 주고 붙인다.
            XLSX.utils.book_append_sheet(wb, newWorksheet, excelHandler.getSheetName());


            // step 4. 엑셀 파일 만들기
            var wbout = XLSX.write(wb, {bookType: 'xlsx', type: 'binary'});

            // step 5. 엑셀 파일 내보내기
            saveAs(new Blob([s2ab(wbout)], {type: "application/octet-stream"}), excelHandler.getExcelFileName());


        }


        //엑셀업로드
        var excelJson;

        //엑셀파일 읽어 json으로 변경하기
        function readExcel() {


            let input = event.target;
            let reader = new FileReader();
            reader.onload = function () {
                let data = reader.result;
                let workBook = XLSX.read(data, {type: 'binary'});

                workBook.SheetNames.forEach(function (sheetName) {
                    let rows = XLSX.utils.sheet_to_json(workBook.Sheets[sheetName]);

                    excelJson = rows;
                    excelJsonToGrid(excelJson)
                })
            };
            reader.readAsBinaryString(input.files[0]);
        }


        //json 형태로 바꾼 엑셀내용을 그리드에 표시
        function excelJsonToGrid(excelJson) {
            myGrid.clearAll(false);

            if (!myComboCmpyCd.getSelectedValue()) {
                alert("회사코드가 없습니다.");
                return;
            }

            excelUploadData = [];
            var columns = myGrid.getColumnCount()
            for (var i = 0; i < excelJson.length; i++) {

                var jsonData = {};


                for (var c = 0; c < columns; c++) {
                    jsonData[myGrid.getColumnId(c)] = excelJson[i][myGrid.getColLabel(c)];
                }


                jsonData["cmpyCd"] = myComboCmpyCd.getSelectedValue();
                jsonData["exclRow"] = (i + 1);
                jsonData["saveUser"] = /*[[${session.tblUserMId}]]*/;
                jsonData["inptSys"] = "ERP_EXCL";


                //그리드에표시
                myGrid.addRow(i + 1, "");	//로우 추가	//로우는 1부터 시작해야함. 0부터 시작하면 안됨. 그래서 i 에 1을 더함
                myGrid.setRowData(i + 1, jsonData);
                //그리드에표시 끝

                excelUploadData.push(jsonData)

            }
            //console.log(excelUploadData)
            //fnObj.searchOpen.excelUploadJson(excelUploadData);
        }


        function exclDown() {

            var rowNum = myGrid.getRowsNum();


            var eqCnt = 1;
            myGrid.forEachRow(function (rId) {
                if (rId == rowNum)	//로우 아이디와 로우수가 같으면
                {
                    eqCnt++;	//더함
                }
            });
            //로우수에 eqCnt을 더해서 같은 로우아이디가 없게 한다
            rowNum = rowNum + eqCnt;
            myGrid.addRow(rowNum, '');
            exportExcel2();
            myGrid.deleteRow(rowNum);

        }

        $(document).ready(function () {


            myGrid = new dhtmlXGridObject('grid');	//그리드


            fnObj.gridOpen.grid()

            fnObj.comboOpen.comboCmpyCd();


            sendObject = /*[[${sendObject}]]*/;


            //사용자 정보 조회 - 수정일 경우
            window.onresize = function (event) {		//윈도우의 사이즈가 변경했을떄
                fnObj.gridOpen.setWidth();
                fnObj.gridOpen.setWidth();
            };
        });
    </script>
</head>
<body>
<div id="mainDiv">
    <div class="popup-header-container">
        <div class="popup-header-text">상품구성품 관리(BOM) 엑셀 업로드</div>

        <div class="button-container">
            <input id="fileUpload" type="file" class="action-button" onchange="readExcel()"
                   accept=".xls,.xlsx"/>

            <input id="btnSearch" type="button" class="action-button primary" onclick="fnObj.searchOpen.exclUpload()"
                   value="일괄등록">

            <button id="btnExcelDown" class="action-button" onclick="exclDown();">엑셀업로드 양식 다운로드</button>
        </div>
    </div>

    <div id="inputDiv0" class="search-container" style="display: none;">
        <span class="cell">
			<span class="item-head">
				회사
			</span>
			<span class="item-data" disabled>
				<div id="cmpyCd"></div>
			</span>
		</span>
    </div>


</div>
<div id="gridDiv">
    <div id="grid"></div>
</div>
</body>
</html>
