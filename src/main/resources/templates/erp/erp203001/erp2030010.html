                grid2Distance: function () {
                    //거리표시 삭제하기
                    if (distanceOverlay != undefined || distanceOverlay != null) {
                        distanceOverlay.forEach(function (distance, i) {
                            distanceOverlay[i].setMap(null);
                        });
                    }

                    //직선표시 한거 삭제하기
                    if (drawLine != undefined || drawLine != null) {
                        drawLine.forEach(function (draw, i) {
                            drawLine[i].setMap(null);
                        });
                    }
                    //아래그리드를 대상으로 거리를 구함

                    var samePaltNoxxs = [];
                    myGrid2.forEachRow(function (pId) {
                        var grid2RowId = myGrid2.cellById(pId, myGrid2.getColIndexById("rowId")).getValue();

                        var grid2NewPaltNoSeq = myGrid2.cellById(pId, myGrid2.getColIndexById("newPaltNoSeq")).getValue();


                        positions.forEach(function (position, index) {
                            if (grid2RowId == position.rowId && position.rowId) {

                                //position.newPaltNoSeq = grid2NewPaltNoSeq;
                                var pos = position;
                                pos.newPaltNoSeq = grid2NewPaltNoSeq;
                                samePaltNoxxs.push(pos);
                            }
                        });
                    });
                    //팔렛트 번호에 맞는것만 모았으니까 순번seq 와 순서rowId 대로 정렬

                    //console.log(samePaltNoxxs)
                    samePaltNoxxs.sort(function (a, b) { // 오름차순
                        return Number(a.newPaltNoSeq) < Number(b.newPaltNoSeq) ? -1 : Number(a.newPaltNoSeq) > Number(b.newPaltNoSeq) ? 1 : 0;

                    });
                    //console.log(samePaltNoxxs)


                    //마커 사이의 선 그리기 및 거리 구하기
                    var linePath;
                    var lineLine = new daum.maps.Polyline();
                    var distance;


                    //$("#distance").val(distance+"");


                    var totalDistance = 0;
                    //반복하면서 마커 사이에 선을 그려주고 거리를 표시해줌
                    samePaltNoxxs.forEach(function (samePaltNoxx, i) {

                        if (i != 0) {
                            linePath = [samePaltNoxxs[i - 1].latlng, samePaltNoxxs[i].latlng] //라인을 그리려면 두 점이 있어야하니깐 두 점을 지정했습니다
                        }

                        lineLine.setPath(linePath); // 선을 그릴 라인을 세팅합니다

                        drawLine[i] = new daum.maps.Polyline({
                            //map : map, // 선을 표시할 지도입니다
                            endArrow: true,
                            path: linePath,
                            strokeWeight: 3, // 선의 두께입니다
                            //strokeColor : '#db4040', // 선의 색깔입니다
                            strokeColor: '#585858', // 선의 색깔입니다

                            strokeOpacity: 0.5, // 선의 불투명도입니다 0에서 1 사이값이며 0에 가까울수록 투명합니다
                            strokeStyle: 'solide' // 선의 스타일입니다
                        });
                        drawLine[i].setMap(map);

                        distance = Math.round(lineLine.getLength());

                        totalDistance = totalDistance + distance;

                        displayCircleDot(samePaltNoxxs[i].latlng, distance, i);

                    });
                    $("#distance").val(Math.round(totalDistance / 1000) + " km");

                },

            <div id="map" style="width: 100%; height: 100%;"></div>
            <script type="text/javascript"
                    th:src="@{//dapi.kakao.com/v2/maps/sdk.js?appkey=4ca76d83b764efaae3a6970aed10e787&libraries=services(${#calendars.format(#calendars.createNow(), 'yyyyMMdd')})}">
            </script>
            <!--				<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=4ca76d83b764efaae3a6970aed10e787&libraries=services20250318">-->
            <!--				</script>-->
            <script>``
            var mapContainer = document.getElementById('map'), // 지도를 표시할 div
                mapOption = {
                    center: new kakao.maps.LatLng(33.450701, 126.570667), // 지도의 중심좌표
                    level: 10 // 지도의 확대 레벨
                };

            // 지도를 생성합니다
            var map = new kakao.maps.Map(mapContainer, mapOption);

            ////////var distanceOverlay; // 선의 거리정보를 표시할 커스텀오버레이 입니다
            var dots = {}; // 선이 그려지고 있을때 클릭할 때마다 클릭 지점과 거리를 표시하는 커스텀 오버레이 배열입니다.


            // 일반 지도와 스카이뷰로 지도 타입을 전환할 수 있는 지도타입 컨트롤을 생성합니다
            var mapTypeControl = new kakao.maps.MapTypeControl();

            //지도 유형
            var mapTypes = {
                terrain: kakao.maps.MapTypeId.TERRAIN,
                traffic: kakao.maps.MapTypeId.TRAFFIC,
                bicycle: kakao.maps.MapTypeId.BICYCLE,
                useDistrict: kakao.maps.MapTypeId.USE_DISTRICT
            };

            // 지도에 컨트롤을 추가해야 지도위에 표시됩니다
            // kakao.maps.ControlPosition은 컨트롤이 표시될 위치를 정의하는데 TOPRIGHT는 오른쪽 위를 의미합니다
            map.addControl(mapTypeControl, kakao.maps.ControlPosition.TOPRIGHT);

            // 지도 확대 축소를 제어할 수 있는  줌 컨트롤을 생성합니다
            var zoomControl = new kakao.maps.ZoomControl();
            map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);


            var locPosition, message;
            var lat, lon;
            //HTML5의 geolocation으로 사용할 수 있는지 확인합니다
            if (navigator.geolocation) {

                // GeoLocation을 이용해서 접속 위치를 얻어옵니다
                navigator.geolocation.getCurrentPosition(function (position) {

                    lat = position.coords.latitude, // 위도
                        lon = position.coords.longitude; // 경도

                    locPosition = new kakao.maps.LatLng(lat, lon), // 마커가 표시될 위치를 geolocation으로 얻어온 좌표로 생성합니다
                        //message = '<div style="padding:5px;">위치</div>'; // 인포윈도우에 표시될 내용입니다
                        message = null;
                    //displayMarker(locPosition, message);

                    map.setCenter(locPosition);
                });


            } else { // HTML5의 GeoLocation을 사용할 수 없을때 마커 표시 위치와 인포윈도우 내용을 설정합니다

                locPosition = new kakao.maps.LatLng(33.450701, 126.570667),
                    message = '현재위치를 사용할수 없습니다';

                //displayMarker(locPosition, message); 	//지도에 마커와 인포윈도우를 표시하는 함수입니다
                map.setCenter(locPosition);      		//지도를 위치를 중심으로 이동
            }


            //지도에 마커와 인포윈도우를 표시하는 함수입니다
            function displayMarker(locPosition, message) {

                // 마커를 생성합니다
                var marker = new kakao.maps.Marker({
                    map: map,
                    position: locPosition,
                    clickable: true	//마커를 클릭할수있게
                });

                var iwContent = message, // 인포윈도우에 표시할 내용
                    iwRemoveable = true;

                // 인포윈도우를 생성합니다
                var infowindow = new kakao.maps.InfoWindow({
                    content: iwContent,
                    removable: iwRemoveable
                });

                // 인포윈도우를 마커위에 표시합니다
                if (message) {
                    infowindow.open(map, marker);
                }
                // 지도 중심좌표를 접속위치로 변경합니다
                map.setCenter(locPosition);
            }


            // 인포윈도우를 표시하는 클로저를 만드는 함수입니다
            function makeOverListener(map, marker, infowindow) {
                return function () {
                    infowindow.open(map, marker);
                };
            }

            // 인포윈도우를 닫는 클로저를 만드는 함수입니다
            function makeOutListener(infowindow) {
                return function () {
                    infowindow.close();
                };
            }

            //var selectedMarker = null;// 클릭한 마커를 담을 변수
            var markers = [];
            var positions = [];

            function onLoadMap() {
                positions = [];
                // 주소-좌표 변환 객체를 생성합니다

                for (var i = 0; i < markers.length; i++) {
                    markers[i].setMap(null);	//지도에 표시한 마커 지우기
                }
                markers = [];	//마커가 들어갈 배열 초기화 하기


                var infowindow;
                var marker;

                                    {
                                        imageUrl = 'http://gloakoreahost.cdn3.cafe24.com/marker/green/marker_ing_others.png'; // 녹색
                                    }

                                    //20220423 정연호추가. 판매오더배송상태 코드가 9999 배송완료라면 위에 꺼 무시하고 imageUrl을 재정의(라벤더)
                                    if (addr[index].soStatCd == "9999") {
                                        imageUrl = 'http://gloakoreahost.cdn3.cafe24.com/marker/lavender/marker_9999_others.png'; // 라벤
                                    } else if (addr[index].soStatCd == "8000") { //미마감
                                        imageUrl = 'http://gloakoreahost.cdn3.cafe24.com/marker/orange/marker_8000_others.png'; // 미마감은 오렌지색
                                    }

                                    imageSrc = imageUrl,

                                        //imageSize = new kakao.maps.Size(30, 36), // 마커이미지의 크기입니다

                                    // 마커의 이미지정보를 가지고 있는 마커이미지를 생성합니다

                                    {

                                    }

                                    //20220423 정연호추가. 판매오더배송상태 코드가 9999 배송완료라면 위에 꺼 무시하고 imageUrl을 재정의(라벤더)
                                    if (addr[index].soStatCd == "9999") {

                                    // 마커의 이미지정보를 가지고 있는 마커이미지를 생성합니다

                                    clickImageSrc = "http://gloakoreahost.cdn3.cafe24.com/marker2/marker_2_red.png",		//red

                                                        toastr.error('이미 배송 완료 입니다.(지도 마커 클릭)');
                                                    } else if (myGrid.cellById(markers[u].rowId, myGrid.getColIndexById("soStatCd")).getValue() == "8000") {
                                                        toastr.error('이미 배송 완료 (미마감) 입니다.(지도 마커 클릭)');
                                                    } else {
                                                        toastr.error('이미 모바일 전송 완료 입니다.(지도 마커 클릭)');
                                                    }
                                                    //20220106 정연호 지도 마커 클릭 했을때 그리드의 항목 선택
                                                    myGrid.selectRowById(markers[u].rowId);

                                                    return;
                                                }


                                                //마커를 클릭한다
                                                ////console.log("이미 클릭된 마커가 없고, 이미 클릭한 마커와 지금 클릭한 마커가 다르면 u : " + u);
                                                markers[u].clickYn = "Y";
                                                markers[u].setImage(markers[u].clickImage);

                                                myGrid.cellById(markers[u].rowId, myGrid.getColIndexById("chk")).setValue("1");

                                                myGrid.selectRowById(markers[u].rowId);


                                                myGrid2.addRow(markers[u].rowId, "");
                                                myGrid2.setRowData(markers[u].rowId, myGrid.getRowData(markers[u].rowId));


                                                //20211120 추가. 그리드2에 로우를 넣으면 그리드1에 해당로우는 delChk를 비활성화

                                                myGrid.cellById(markers[u].rowId, myGrid.getColIndexById("delChk")).setDisabled(true);


                                                if (myGrid2.cellById(markers[u].rowId, myGrid2.getColIndexById("instPlanYn")).getValue() == "Y") {

                                                } else {
                                                    myGrid2.cellById(markers[u].rowId, myGrid2.getColIndexById("saveGubn")).setValue("INS");
                                                }


                                                var newPaltNo = 0;
                                                myGrid2.forEachRow(function (pId) {


                                                    if (Number(myGrid2.cellById(pId, myGrid2.getColIndexById("newPaltNoSeq")).getValue()) > newPaltNo) {
                                                        newPaltNo = Number(myGrid2.cellById(pId, myGrid2.getColIndexById("newPaltNoSeq")).getValue())
                                                    }

                                                });
                                                myGrid2.cellById(markers[u].rowId, myGrid2.getColIndexById("newPaltNoSeq")).setValue((newPaltNo + 1) + "")
                                                myGrid2.cellById(markers[u].rowId, myGrid2.getColIndexById("chk")).setValue("")
                                                fnObj.searchOpen.grid2CbmSum();
                                                fnObj.searchOpen.grid2InstCostSum();
                                                fnObj.searchOpen.grid2Distance();


                                            }

                                            //해당마커가 클릭이 되어있는상태

                                                //마커 해제
                                                ////console.log("이미 클릭된 마커가 있고, 이미 클릭한 마커와 지금 클릭한 마커가 같으면 u : " + u);
                                                markers[u].clickYn = "N";
                                                markers[u].setImage(markers[u].normalImage);
                                                myGrid.cellById(markers[u].rowId, myGrid.getColIndexById("chk")).setValue("0");
                                                myGrid.selectRowById(markers[u].rowId);

                                                myGrid2.forEachRow(function (pId) {

                                                    var oldP = Number(myGrid2.cellById(markers[u].rowId, myGrid2.getColIndexById("newPaltNoSeq")).getValue());
                                                    var newP = Number(myGrid2.cellById(pId, myGrid2.getColIndexById("newPaltNoSeq")).getValue());
                                                    if (newP > oldP) {
                                                        myGrid2.cellById(pId, myGrid2.getColIndexById("newPaltNoSeq")).setValue((newP - 1) + "")
                                                    }

                                                });
                                                myGrid2.deleteRow(markers[u].rowId);

                                                //20211120 추가. 그리드2에 로우를 삭제하면 그리드1에 해당로우는 delChk를 활성화
                                                //myGrid.cellById(markers[u].rowId,myGrid.getColIndexById("delChk")).setDisabled(false);


                                                if (myGrid.cellById(markers[u].rowId, myGrid.getColIndexById("instPlanYn")).getValue() != "Y") {
                                                    //20211120 추가. 그리드2에 로우를 삭제하면 그리드1에 해당로우는 delChk를 활성화
                                                    myGrid.cellById(markers[u].rowId, myGrid.getColIndexById("delChk")).setDisabled(true);
                                                }
                                                    //20211231 정연호 주석처리. SP에서 처리하므로 삭제유무 상관없음
                                                /* else if (myGrid.cellById(markers[u].rowId,myGrid.getColIndexById("mobileTranYn")).getValue() == "Y")
                                                        {
                                                             myGrid.cellById(markers[u].rowId,myGrid.getColIndexById("delChk")).setDisabled(true);
                                                        } */
                                                else {
                                                    myGrid.cellById(markers[u].rowId, myGrid.getColIndexById("delChk")).setDisabled(false);
                                                }


                                                fnObj.searchOpen.grid2CbmSum();
                                                fnObj.searchOpen.grid2InstCostSum();
                                                fnObj.searchOpen.grid2Distance();
                                            }


                                            //클릭 한 마커의 값에 해당하는걸 그리드에서 선택한것 처럼 해당로우를 돋보이게 해준다


                                        });


                                    }
                                });

                                if (index == 0) {
                                    map.setCenter(inner.latlng);
                                }
                                //addr.push(inner);
                                positions.push(inner);

                                inner = {};


                            }	//END of if(result.length == 1)

                            else {
                                myGrid.cellById(addr[index].rowId, myGrid.getColIndexById("mapFindAddr")).setValue(result.length + "개");
                            }
                        }	//END of  if (status === kakao.maps.services.Status.OK)

                    });	//END of geocoder.addressSearch(addr[index].addr1, function(result, status)

                });		//END of addr.forEach(function(address,index) ///반복 반복 반복 반복의 끝

            }


            // 체크 박스를 선택하면 호출되는 함수입니다
            function setOverlayMapTypeId() {
                var chkTerrain = document.getElementById('chkTerrain'),
                    chkTraffic = document.getElementById('chkTraffic'),
                    chkBicycle = document.getElementById('chkBicycle'),
                    chkUseDistrict = document.getElementById('chkUseDistrict');

                // 지도 타입을 제거합니다
                for (var type in mapTypes) {
                    map.removeOverlayMapTypeId(mapTypes[type]);
                }

                // 지적편집도정보 체크박스가 체크되어있으면 지도에 지적편집도정보 지도타입을 추가합니다
                if (chkUseDistrict.checked) {
                    map.addOverlayMapTypeId(mapTypes.useDistrict);
                }

                // 지형정보 체크박스가 체크되어있으면 지도에 지형정보 지도타입을 추가합니다
                if (chkTerrain.checked) {
                    map.addOverlayMapTypeId(mapTypes.terrain);
                }

                // 교통정보 체크박스가 체크되어있으면 지도에 교통정보 지도타입을 추가합니다
                if (chkTraffic.checked) {
                    map.addOverlayMapTypeId(mapTypes.traffic);
                }

                // 자전거도로정보 체크박스가 체크되어있으면 지도에 자전거도로정보 지도타입을 추가합니다
                if (chkBicycle.checked) {
                    map.addOverlayMapTypeId(mapTypes.bicycle);
                }

            }


            function displayCircleDot(position, distance, i) {
                if (distance > 0) {
                    // 클릭한 지점까지의 그려진 선의 총 거리를 표시할 커스텀 오버레이를 생성합니다
                    distanceOverlay[i] = new daum.maps.CustomOverlay(
                        {
                            content: '<div class="dotOverlay"  style="background:white;padding: 5px;background: white;background-color: rgba(255, 255, 255, 0.6); border-radius: 20px;">'
                                + '<span class="number" style="    font-size: larger;font-weight: bold;">'
                                + Math.round(distance / 1000) + ' km'
                                + '</span>'
                                + '</div>',
                            position: position,

                            xAnchor: 1.3,		//20220118 정연호 1을 1.3으로 변경
                            yAnchor: 1.3,		//원래 1 //20220118 정연호 1을 1.3으로 변경
                            zIndex: 1			//원래 2	//20220118 정연호 5를 1 로 변경
                        });

                    // 지도에 표시합니다
                    distanceOverlay[i].setMap(map);
                }
            }
