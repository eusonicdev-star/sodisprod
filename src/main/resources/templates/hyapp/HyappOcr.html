<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>상품명 스캔</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
<h2>상품명 스캔</h2>
<p>앱에서 카메라를 실행하여 상품명을 촬영합니다.</p>

<div>
    <label>인식된 상품명</label><br />
    <input id="productName" type="text" style="width: 100%;" readonly />
</div>

<button onclick="requestOcr()">다시 스캔</button>

<script>
    function requestOcr() {
        if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
            window.ReactNativeWebView.postMessage(
                JSON.stringify({ type: 'requestOcrScan' })
            );
        }
    }

    // 페이지 처음 열릴 때 한 번 자동 실행
    window.addEventListener('load', requestOcrScan);

    // ✅ RN에서 injectJavaScript 로 호출해주는 함수
    function onOcrResult(text) {
        document.getElementById('productName').value = text || '';
    }
</script>
</body>
</html>
