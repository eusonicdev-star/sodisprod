<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>바코드 출력 테스트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="card mx-auto" style="max-width: 500px;">
    <div class="card-header bg-primary text-white">바코드 출력 테스트 (50*30)</div>
    <div class="card-body">
        <div class="mb-3">
            <label class="form-label">상품명</label>
            <input type="text" id="mtrlNm" class="form-control" value="테스트 상품">
        </div>
        <div class="mb-3">
            <label class="form-label">상품코드</label>
            <input type="text" id="mtrlCd" class="form-control" value="PROD-001">
        </div>
        <div class="mb-3">
            <label class="form-label">바코드</label>
            <input type="text" id="barcode" class="form-control" value="880123456789">
        </div>
        <div class="mb-3">
            <label class="form-label">출력 수량</label>
            <input type="number" id="qty" class="form-control" value="1">
        </div>
        <button class="btn btn-success w-100" onclick="sendPrintRequest()">프린터로 전송</button>
    </div>
</div>

<script>
    async function sendPrintRequest() {
        const data = {
            mtrlNm: document.getElementById('mtrlNm').value,
            mtrlCd: document.getElementById('mtrlCd').value,
            barcode: document.getElementById('barcode').value,
            qty: document.getElementById('qty').value
        };

        try {
            const response = await fetch('/api/print/barcode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if(result.status === 'OK') alert("출력 명령이 전송되었습니다.");
            else alert("에러 발생: " + result.message);
        } catch (err) {
            alert("서버 통신 실패");
        }
    }
</script>
</body>
</html>
