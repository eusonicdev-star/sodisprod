<!DOCTYPE HTML>
<html xmlns:sec="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" style="height:100%;">

<head>
	<!-- <link rel="icon" href="data:;base64,iVBORw0KGgo="> -->
	<link rel="icon" href="/css/favicon.ico" type="image/x-icon" sizes="16x16">
	<title>얼라이언스</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="stylesheet" type="text/css" th:href="@{/css/login.css}" />
	<link rel="stylesheet" type="text/css"
		href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
		integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="https://cdn.dhtmlx.com/edge/fonts/font_roboto/roboto.css">
	<link rel="stylesheet" type="text/css"
		href="https://cdn.dhtmlx.com/edge/fonts/font_awesome/css/font-awesome.min.css">
	<link rel="stylesheet" type="text/css" href="https://cdn.dhtmlx.com/edge/skins/terrace/dhtmlx.css">

	<script src="https://cdn.dhtmlx.com/edge/dhtmlx.js" crossorigin="anonymous"></script>
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"
		integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
	<script type="text/javascript" src="/js/commCode.js"></script>



	<script>
		var myCombo;


		$(document).ready(function () {
			var agent = navigator.userAgent.toLowerCase();
			if ((navigator.appName == 'Netscape' && navigator.userAgent.search('Trident') != -1) || (agent.indexOf("msie") != -1)) {
				alert('Internet Explorer는 호환되지 않는 브라우저 입니다.')
				$("#body").hide();
				return;
			}

			//로컬에 저장된 아이디가 있다면 그것을 아이디 란에 표시
			var localLoginId = localStorage.getItem('loginId');
			if (localLoginId) {
				$("#loginId").val(localLoginId);
				//체크박스에 체크를 하기
				$("#idSave").prop("checked", true);
			}

			var localCmpyCd = localStorage.getItem('cmpyCd');
			if (localCmpyCd) {
				$("#cmpyCd").val(localCmpyCd);
				$("#cmpyCdSave").prop("checked", true);
			}

			//암호 보기/안보기
			$("input[id=pwCheck]:checkbox").click(function () {
				if ($("input[id=pwCheck]:checkbox").is(":checked")) {
					$("#password").attr('type', "text");
				}
				else {
					$("#password").attr('type', 'password');
				}
			});



			//저장된 아이디 보여주기 및 아이디 저장/해제
			$("input[id=idSave]:checkbox").click(function () {
				var localLoginId = localStorage.getItem('loginId');	//로컬에 저장된 아이디를 구함
				var idSaveChk = $("input[id=pwCheck]:checkbox").is(":checked");
				//아이디가 있다면 삭제를 함

				if (!idSaveChk && localLoginId)	//체크 해제 & 아이디값이 있다(체크를 해제한다는것은 아이디를 저장하지 않겠다) 
				{
					localStorage.removeItem('loginId');
				}

				//로컬에 저장된 아이디가 없으면 
				else {
					localStorage.setItem('loginId', $("#loginId").val());	//로컬에 저장을 함

				}

			});




			//저장된 컴퍼니 코드 보여주기 및 저장/해제
			$("input[id=cmpyCdSave]:checkbox").click(function () {
				var localLoginId = localStorage.getItem('cmpyCd');	//로컬에 저장된 아이디를 구함
				var idSaveChk = $("input[id=cmpyCdSave]:checkbox").is(":checked");
				//아이디가 있다면 삭제를 함

				if (!idSaveChk && localLoginId)	//체크 해제 & 아이디값이 있다(체크를 해제한다는것은 아이디를 저장하지 않겠다) 
				{
					localStorage.removeItem('cmpyCd');
				}

				//로컬에 저장된 아이디가 없으면 
				else {
					localStorage.setItem('cmpyCd', $("#cmpyCd").val());	//로컬에 저장을 함

				}

			});

			myCombo = new dhtmlXCombo("company");



			comboList(myCombo, 'A', 'COMM', 'CMPY_CD', '', 'Y', 'req');

			myCombo.selectOption(myCombo.getIndexByValue("A"));
			$("#cmpyCd").val(myCombo.getSelectedValue());
			myCombo.attachEvent("onChange", function (value, text) {
				$("#cmpyCd").val(myCombo.getSelectedValue());
			});
			if (localCmpyCd) {
				myCombo.selectOption(myCombo.getIndexByValue(localCmpyCd));
			}
			myCombo.disable();
		});
	</script>

<body id="body">

	<br><br>
	<div class="container">
		<form th:action="@{/loginRe}" method="POST" class="form-signin"
			style="background-color:white;border: 2px solid black;" id="login_form" name="login_form">

			<!-- <h3 class="form-signin-heading">얼라이언스 - 물류시스템</h3> -->
			<img src="https://eugenesonic.cdn1.cafe24.com/logo.png" width="100%">
			<br />
			<table width="100%" border=0>


				<tr style="display:none;">

					<td>

					</td>
					<td>
						<span>회사</span><span class="pull-right"><input type="checkbox" id="cmpyCdSave">저장</input></span>
					</td>
				</tr>
				<tr style="display:none;">
					<td>

					</td>
					<td>
						<span class="form-control">
							<div id="company" name="company"></div>
						</span>

					</td>
					<td>
						<input type="hidden" id="cmpyCd" name="cmpyCd" />
					</td>
				</tr>
				<tr style="display:none;">
					<td>
						<br>
					</td>
					<td>

					</td>
				</tr>




				<tr>
					<td>

					</td>
					<td>
						<span>아이디</span><span class="pull-right"><input type="checkbox" id="idSave">저장</input></span>
					</td>
				</tr>
				<tr>
					<td valign="middle" align="center">
					</td>
					<td>
						<input type="text" id="loginId" name="loginId" th:placeholder="Id" class="form-control" />
					</td>
					<td>

					</td>
				</tr>
				<tr>
					<td>
						<br>
					</td>
					<td>
					</td>
				</tr>
				<tr>
					<td>

					</td>
					<td>
						<span>암호</span><span class="pull-right"><input type="checkbox" id="pwCheck">보기</input></span>
					</td>
				</tr>
				</tr>
				<tr>
					<td>

					</td>
					<td>
						<input type="password" th:placeholder="Password" id="password" name="password"
							class="form-control" />
					</td>
					<td>

					</td>
				</tr>
			</table>

			<div align="center" th:if="${param.error}">
				<p style="font-size: 20; color: #FF1C19;">
					<span th:if="${param.error.toString() == 'cmpyCd'}" th:text="'선택한 회사를 확인하세요.'">
					</span>
					<span th:if="${param.error.toString() == 'true'}" th:text="'아이디 또는 암호를 확인하세요.'">
					</span>
					<span th:if="${param.error.toString() == 'loginH'}" th:text="'로그인과정중 문제가 발생하였습니다.'">
					</span>
					<span th:if="${param.error.toString() == 'userInfo'}" th:text="'사용자정보를 찾을수 없습니다.'">
					</span>
				</p>
			</div>

			<div align="center" th:if="${param.authError}">
				<p style="font-size: 20; color: #FF1C19;">만료된 토큰이거나 토큰값을 갱신하여 주시길 바랍니다.</p>
			</div>



			<br>
			<button class="btn btn-lg btn-primary btn-block" name="Submit" value="Login" type="Submit"
				th:text="로그인"></button>
			<br>
			<input type="button" class="btn btn-lg btn-primary btn-block" name="repw" value="암호변경"
				onclick="top.location.href = './repw'"></input>
		</form>

	</div>
</body>

</html>
