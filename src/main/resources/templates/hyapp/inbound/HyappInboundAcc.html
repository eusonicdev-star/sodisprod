<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>입고 검수 (HyappInboundAcc)</title>
    <style>
        :root { --bg:#f7f7f7; --card:#fff; --border:#e8e8e8; --text:#111; --sub:#666; }
        body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); }
        header { position: sticky; top:0; background:#fff; border-bottom:1px solid #e5e5e5; padding:12px 16px; z-index:10; }
        h1 { margin:0; font-size:16px; }
        main { padding:16px; padding-bottom:24px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin:10px 0; box-shadow: 0 1px 0 rgba(0,0,0,0.02); }
        .title { display:flex; align-items:center; justify-content:space-between; gap:10px; }
        .badge { font-size:12px; padding:2px 8px; border:1px solid #ddd; border-radius:999px; color:#333; background:#fafafa; }
        .meta { margin-top:10px; font-size:14px; color:#333; display:grid; gap:8px; }
        .meta div { display:flex; justify-content:space-between; gap:10px; }
        .meta span { color:var(--sub); }

        /* ? 화면 넘침 방지 */
        .row { display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap; }
        .input {
            flex:1 1 0; min-width:0;
            padding:12px; border:1px solid #ddd; border-radius:10px; background:#fff;
            font-size:16px; height:44px; box-sizing:border-box;
        }

        /* ? 합격=파란색, 불합격=노란색 */
        .input.pass { background:#dbeafe; border-color:#93c5fd; }
        .input.fail { background:#fef9c3; border-color:#facc15; }

        .btn {
            padding:12px 14px; border:1px solid #ddd; border-radius:10px; background:#fff;
            font-size:16px; cursor:pointer; height:44px; box-sizing:border-box;
            flex:1 1 0; min-width:0;
        }
        .btn.dark { background:#111; color:#fff; border-color:#111; }
        .btn:disabled { opacity:.55; cursor:not-allowed; }

        .status { margin:12px 0; font-size:13px; color:#555; }
        .muted { color:var(--sub); font-size:12px; line-height:1.35; }
        pre { white-space: pre-wrap; word-break: break-word; margin:0; }
    </style>
</head>
<body>
<header>
    <h1>입고 검수</h1>
</header>

<main>
    <!-- ? 전달받은 TBL_INBOUND_PRODUCT_ID 보관 -->
    <input type="hidden" id="tblInboundProductIdHidden" value="" />
    <div id="status" class="status"></div>

    <!-- 선택된 입고 예정 정보 -->
    <div id="selectedCard" class="card" style="display:none;">
        <div class="title">
            <div><b id="agntNm">-</b></div>
            <span class="badge">입고예정</span>
        </div>
        <div class="meta">
            <div><span>상품코드</span><b id="mtrlCd">-</b></div>
            <div><span>상품명</span><b id="mtrlNm">-</b></div>
            <div><span>예정수량</span><b id="planQty">-</b></div>
        </div>
    </div>

    <!-- 검수 입력 -->
    <div class="card">
        <div style="font-weight:600;">검수 입력</div>
        <div class="muted" style="margin-top:6px;">
            * 파렛트 입고일 경우 파렛트 수량이 필수입니다.<br/>
            * 예정수량 기준으로 <b>합격 + 불합격 = 예정수량</b>이 되도록 자동 계산됩니다.
        </div>

        <!-- 차량톤수 -->
        <div class="row">
            <select id="vehicleTon" class="input" style="appearance:auto;">
                <option value="">차량톤수 선택</option>
                <option value="1T">1톤</option>
                <option value="3.5T">3.5톤</option>
                <option value="5T">5톤</option>
                <option value="11T">11톤</option>
                <option value="20FT">컨테이너 20FT</option>
                <option value="40FT">컨테이너 40FT</option>
            </select>
        </div>

        <!-- 입고 방법 -->
        <div class="row">
            <select id="inboundMethod" class="input" style="appearance:auto;">
                <option value="">입고 방법 선택</option>
                <option value="BULK">벌크</option>
                <option value="PALLET">파렛트</option>
            </select>
        </div>

        <!-- 파렛트 수량 (파렛트 선택 시만 표시) -->
        <div id="palletQtyWrap" style="display:none; margin-top:10px;">
            <div class="row">
                <input id="palletQty" class="input" type="number" inputmode="numeric" min="1" placeholder="파렛트 수량 (N개)" />
            </div>
        </div>

        <!-- ? 합격/불합격 수량 (자동 합 맞추기) -->
        <div class="row">
            <input id="passQty" class="input pass" type="number" inputmode="numeric" min="0" placeholder="합격 수량" />
            <input id="failQty" class="input fail" type="number" inputmode="numeric" min="0" placeholder="불합격 수량" />
        </div>

        <div class="row">
            <input id="memo" class="input" type="text" placeholder="메모(선택)" />
        </div>

        <!-- ? 버튼 1개로 통합 -->
        <div class="row">
            <button id="confirmBtn" class="btn dark">입고 검수 확인</button>
        </div>

        <div class="row">
            <button id="backBtn" class="btn">목록으로</button>
        </div>
    </div>

    <!-- 디버그(필요시만) -->
    <div id="debugCard" class="card" style="display:none;">
        <div style="font-weight:600;">디버그</div>
        <div class="muted" style="margin-top:6px;">선택 데이터가 안 넘어올 때만 확인하세요.</div>
        <pre id="debugPre" style="margin-top:10px;"></pre>
    </div>
</main>

<script>
    // ===== helpers =====
    function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, m => ({
            "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
        }[m]));
    }
    function pick(obj, keys) {
        for (const k of keys) {
            const v = obj?.[k];
            if (v !== undefined && v !== null && String(v) !== "") return v;
        }
        return "";
    }
    function setHtmlSafe(id, value) {
        const el = document.getElementById(id);
        if (!el) { console.warn("missing element:", id); return; }
        el.innerHTML = escapeHtml(value ?? "");
    }
    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
    function toIntOrZero(v) {
        const n = Number(v);
        if (!Number.isFinite(n)) return 0;
        return Math.max(0, Math.floor(n));
    }

    // ===== read selected =====
    const statusEl = document.getElementById("status");
    const selectedCard = document.getElementById("selectedCard");
    const debugCard = document.getElementById("debugCard");
    const debugPre = document.getElementById("debugPre");

    const QC_SAVE_URL = "/hyapp/api/inbound/qc/save";

    const STORAGE_KEY = "HYAPP_INBOUND_SELECTED";
    const raw = sessionStorage.getItem(STORAGE_KEY);


    // ? 메인에서 전달된 tblInboundProductId를 hidden에 세팅
    const idFromQuery = new URLSearchParams(location.search).get("tblInboundProductId");
    const inboundIdHiddenEl = document.getElementById("tblInboundProductIdHidden");
    if (inboundIdHiddenEl && idFromQuery) {
        inboundIdHiddenEl.value = idFromQuery;
    }
    // 디버그 토글: URL에 ?debug=1 붙이면 노출
    const debugMode = new URLSearchParams(location.search).get("debug") === "1";
    if (debugMode) {
        debugCard.style.display = "block";
        debugPre.textContent = raw || "(선택 데이터 없음)";
    }

    let selected = null;
    let planQtyNum = 0;

    // inputs
    const passQtyEl = document.getElementById("passQty");
    const failQtyEl = document.getElementById("failQty");
    const confirmBtn = document.getElementById("confirmBtn");

    // ? 자동 합 맞추기 (어느 쪽을 입력해도 나머지가 보정)
    let syncing = false;
    function syncByPass() {
        if (syncing) return;
        syncing = true;

        const plan = planQtyNum;
        let pass = clamp(toIntOrZero(passQtyEl.value), 0, plan);
        const fail = plan - pass;

        passQtyEl.value = String(pass);
        failQtyEl.value = String(fail);

        syncing = false;
        validate();
    }
    function syncByFail() {
        if (syncing) return;
        syncing = true;

        const plan = planQtyNum;
        let fail = clamp(toIntOrZero(failQtyEl.value), 0, plan);
        const pass = plan - fail;

        failQtyEl.value = String(fail);
        passQtyEl.value = String(pass);

        syncing = false;
        validate();
    }
    passQtyEl.addEventListener("input", syncByPass);
    failQtyEl.addEventListener("input", syncByFail);

    function validate() {
        // 선택/예정수량 없으면 저장 불가
        if (!selected || !Number.isFinite(planQtyNum) || planQtyNum <= 0) { confirmBtn.disabled = true; return; }

        const vehicleTon = document.getElementById("vehicleTon")?.value || "";
        const inboundMethod = document.getElementById("inboundMethod")?.value || "";
        const palletQty = Number(document.getElementById("palletQty")?.value || 0);

        if (!vehicleTon) { confirmBtn.disabled = true; return; }
        if (!inboundMethod) { confirmBtn.disabled = true; return; }

        if (inboundMethod === "PALLET" && (!Number.isFinite(palletQty) || palletQty <= 0)) {
            confirmBtn.disabled = true; return;
        }

        // 합이 예정수량인지 확인 (항상 맞춰지지만, 방어)
        const pass = toIntOrZero(passQtyEl.value);
        const fail = toIntOrZero(failQtyEl.value);
        if ((pass + fail) !== planQtyNum) { confirmBtn.disabled = true; return; }

        confirmBtn.disabled = false;
    }

    try {
        if (!raw) {
            statusEl.innerHTML = "선택된 입고 예정 정보가 없습니다.<br/>목록에서 다시 선택해주세요.";
        } else {
            const parsed = JSON.parse(raw);
            selected = parsed?.selected || null;

            // ? hidden 값이 비어있으면 selected에서 ID 보완
            const inboundIdHiddenEl2 = document.getElementById("tblInboundProductIdHidden");
            if (inboundIdHiddenEl2 && !inboundIdHiddenEl2.value && selected) {
                const sid = pick(selected, ["tblInboundProductId", "TBL_INBOUND_PRODUCT_ID", "tbl_inbound_product_id"]);
                if (sid) inboundIdHiddenEl2.value = sid;
            }

            if (!selected) {
                statusEl.innerHTML = "선택 데이터 형식이 올바르지 않습니다.<br/>목록에서 다시 선택해주세요.";
            } else {
                const agntNm = pick(selected, ["agntNm", "AGNT_NM"]);
                const mtrlCd = pick(selected, ["mtrlCd", "MTRL_CD"]);
                const mtrlNm = pick(selected, ["mtrlNm", "MTRL_NM"]);
                const qtyRaw = pick(selected, ["inboundQuantity", "INBOUND_QUANTITY", "qty", "QTY"]);

                setHtmlSafe("agntNm", agntNm || "-");
                setHtmlSafe("mtrlCd", mtrlCd || "-");
                setHtmlSafe("mtrlNm", mtrlNm || "-");
                setHtmlSafe("planQty", (qtyRaw ?? "-"));

                const nQty = Number(qtyRaw);
                planQtyNum = (Number.isFinite(nQty) && nQty >= 0) ? Math.floor(nQty) : 0;

                // 기본: 합격=예정수량, 불합격=0
                if (planQtyNum > 0) {
                    passQtyEl.value = String(planQtyNum);
                    failQtyEl.value = "0";
                } else {
                    passQtyEl.value = "";
                    failQtyEl.value = "";
                }

                selectedCard.style.display = "block";
                statusEl.textContent = "선택된 입고 예정 정보로 검수를 진행하세요.";
            }
        }
    } catch (e) {
        console.error(e);
        statusEl.innerHTML = "선택 데이터 처리 중 오류가 발생했습니다.<br/>목록에서 다시 선택해주세요.";
        if (debugMode) debugPre.textContent = (raw || "") + "\n\n[ERROR]\n" + String(e);
    }

    // ===== pallet qty toggle =====
    const inboundMethodEl = document.getElementById("inboundMethod");
    const palletQtyWrap = document.getElementById("palletQtyWrap");
    const palletQtyEl = document.getElementById("palletQty");

    function togglePalletQty() {
        const isPallet = inboundMethodEl?.value === "PALLET";
        palletQtyWrap.style.display = isPallet ? "block" : "none";
        if (!isPallet && palletQtyEl) palletQtyEl.value = "";
        validate();
    }
    inboundMethodEl?.addEventListener("change", togglePalletQty);
    palletQtyEl?.addEventListener("input", validate);
    document.getElementById("vehicleTon")?.addEventListener("change", validate);
    togglePalletQty();

    // ===== actions =====
    document.getElementById("backBtn")?.addEventListener("click", () => {
        history.back();
    });

    async function submitInspectConfirm() {
        if (!selected) return alert("선택된 입고 예정 정보가 없습니다. 목록에서 다시 선택해주세요.");
        if (!Number.isFinite(planQtyNum) || planQtyNum <= 0) return alert("예정수량이 올바르지 않습니다.");

        const memo = document.getElementById("memo")?.value || "";
        const vehicleTon = document.getElementById("vehicleTon")?.value || "";
        const inboundMethod = document.getElementById("inboundMethod")?.value || "";
        const palletQty = Number(document.getElementById("palletQty")?.value || 0);

        if (!vehicleTon) return alert("차량톤수를 선택해주세요.");
        if (!inboundMethod) return alert("입고 방법을 선택해주세요.");

        if (inboundMethod === "PALLET" && (!Number.isFinite(palletQty) || palletQty <= 0)) {
            return alert("파렛트 입고일 경우 파렛트 수량(N개)을 입력해주세요.");
        }

        // 합격/불합격 수량 (항상 합=예정수량)
        const passQty = clamp(toIntOrZero(passQtyEl.value), 0, planQtyNum);
        const failQty = planQtyNum - passQty;
        passQtyEl.value = String(passQty);
        failQtyEl.value = String(failQty);

        // ? 키값(ID) 포함해서 저장해야 함
        const tblInboundProductId = pick(selected, ["tblInboundProductId", "TBL_INBOUND_PRODUCT_ID", "tbl_inbound_product_id"]);

        if (!tblInboundProductId) {
            return alert("키값(TBL_INBOUND_PRODUCT_ID)이 없습니다. 목록 조회 API 응답에 ID 포함 여부를 확인해주세요.");
        }

        const payload = {
            tblInboundProductId: Number(tblInboundProductId),
            passQty,
            failQty,
            actualQuantity: passQty + failQty, // (현재는 예정수량과 동일)
            actualDate: new Date().toISOString().slice(0, 10), // yyyy-mm-dd
            vhclTonType: vehicleTon,
            inMethod: inboundMethod,
            palletQty: inboundMethod === "PALLET" ? palletQty : null,
            remarks: memo,
            // 참고용 (서버에서 필요하면 사용): cmpyCd/agntCd/mtrlCd 등
            cmpyCd: pick(selected, ["cmpyCd", "CMPY_CD"]),
            agntCd: pick(selected, ["agntCd", "AGNT_CD"]),
            mtrlCd: pick(selected, ["mtrlCd", "MTRL_CD"]),
            mtrlNm: pick(selected, ["mtrlNm", "MTRL_NM"]),
        };

        try {
            confirmBtn.disabled = true;
            statusEl.textContent = "검수 저장 중...";

            const res = await fetch(QC_SAVE_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!res.ok) {
                const t = await res.text().catch(() => "");
                throw new Error(`HTTP ${res.status}${t ? " - " + t : ""}`);
            }

            // 응답이 JSON이 아닐 수도 있어 안전 처리
            let data = null;
            try { data = await res.json(); } catch (_) {}

            statusEl.textContent = "검수 저장 완료";
            alert("입고 검수 확인 완료!");
        } catch (e) {
            console.error(e);
            statusEl.textContent = "검수 저장 실패";
            alert("검수 저장 실패: " + (e?.message || e));
        } finally {
            validate();
        }
    }

    confirmBtn.addEventListener("click", submitInspectConfirm);

    // initial validate
    validate();
</script>
</body>
</html>
