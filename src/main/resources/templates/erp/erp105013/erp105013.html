<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>재고 엑셀 업로드</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="https://cdn.dhtmlx.com/edge/skins/web/dhtmlx.css">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <script src="https://cdn.dhtmlx.com/edge/dhtmlx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.14.3/xlsx.full.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { padding: 20px; font-family: 'Roboto', sans-serif; }
        .upload-box { border: 2px dashed #3b82f6; padding: 25px; text-align: center; margin-bottom: 20px; border-radius: 12px; background: #f8fafc; }
        .btn-area { margin-bottom: 10px; text-align: right; }
        #gridbox { width: 100%; height: 450px; border: 1px solid #dfe4e8; }
    </style>
</head>
<body>

<div class="upload-box">
    <input type="file" id="excelFile" accept=".xlsx, .xls" style="display:none" onchange="readExcel(event)">
    <button class="action-button secondary" onclick="document.getElementById('excelFile').click()">📁 재고 엑셀 파일 선택</button>
    <p style="font-size: 12px; color: #64748b; margin-top: 12px;">
        필수 항목: <b>화주사명, 상품코드, 상품명, 로케이션, 수량, 팔렛트구분</b>
    </p>
</div>

<div class="btn-area">
    <button class="action-button primary" onclick="fnTempSave()">💾 임시 저장</button>
    <button class="action-button secondary" onclick="fnCreateMissingLoc()">누락 로케이션 생성</button>
    <button class="action-button secondary" onclick="fnCreateFloorLoc()">🏢 평치존 만들기</button>
    <button class="action-button primary" onclick="fnFinalConfirm()">🚀 최종 재고 실사 내역 반영하기</button>
</div>

<div id="gridbox"></div>

<script th:inline="javascript">
    var myGrid;
    var sendObject = /*[[${sendObject}]]*/ {}; //
    $(document).ready(function () {
        myGrid = new dhtmlXGridObject('gridbox');
        myGrid.setImagePath("https://cdn.dhtmlx.com/edge/skins/web/imgs/");

        // 요청하신 5개 항목으로 헤더 구성
        myGrid.setHeader("등록일,화주사명,상품코드,상품명,로케이션,수량,팔렛트구분,상태,화주코드,로케이션ID,로케이션명,상품확인");
        myGrid.setColumnIds("saveTime,agntNm,mtrlCd,mtrlNm,locCd,stockQty,paltType,status,agntCd,locId,locNm,mtrlYn");
        myGrid.setInitWidths("200,120,100,180,120,80,100,80,80,80,120,80");
        myGrid.setColAlign("center,left,center,left,center,right,center,center,center,center,left,center");
        myGrid.setColTypes("ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro");
        myGrid.init();
    });

    // 1. 엑셀 자료 읽기 (항목 매핑 변경)
    function readExcel(event) {
        var input = event.target;
        var reader = new FileReader();
        reader.onload = function () {
            var fileData = reader.result;
            var workbook = XLSX.read(fileData, { type: 'binary' });
            var sheetName = workbook.SheetNames[0];
            var jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

            myGrid.clearAll();
            jsonData.forEach(function(row, idx) {
                var gridRow = [
                    row['업체명'] || '',
                    row['제품코드'] || '',
                    row['제품명'] || '',
                    row['실사위치'] || '',
                    row['수량'] || 0,
                    row['파렛트규격'] || '',
                    "<span style='color:blue'>대기</span>"
                ];
                myGrid.addRow(idx + 1, gridRow);
            });
        };
        reader.readAsBinaryString(input.files[0]);
    }

    async function fnTempSave() {
        var rowCount = myGrid.getRowsNum();
        if (rowCount === 0) { alert("업로드할 데이터가 없습니다."); return; }

        if (!confirm("기존 임시 데이터를 삭제하고 현재 내용을 임시 저장하시겠습니까?")) return;

        var dataList = [];
        for (var i = 0; i < rowCount; i++) {
            var rId = myGrid.getRowId(i);
            dataList.push({
                cmpyCd: 'A',
                whCd: '1000', // [확인필요] 실제 창고 코드로 매핑 필요
                agntNm: myGrid.cells(rId, 0).getValue(),
                mtrlCd: myGrid.cells(rId, 1).getValue(),
                mtrlNm: myGrid.cells(rId, 2).getValue(),
                locCd: myGrid.cells(rId, 3).getValue(),
                stockQty: myGrid.cells(rId, 4).getValue(),
                paltType: myGrid.cells(rId, 5).getValue(),
                saveUser: /*[[${session.userId}]]*/ 'SYSTEM' // 세션에서 사용자 ID 추출
            });
        }

        $.ajax({
            url: "/erp105013TempSave", // 임시 저장 전용 엔드포인트
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(dataList),
            success: function (res) {
                alert("임시 저장이 완료되었습니다.");
                loadTempList(); // 저장된 내역 다시 불러오기
            },
            error: function () { alert("임시 저장 중 오류가 발생했습니다."); }
        });
    }
    // 임시 저장 데이터 불러오기 함수 추가
    function loadTempList() {
        $.ajax({
            url: "/erp105013TempList",
            type: "POST",
            data: { cmpyCd: 'A', whCd: '1000' },
            success: function (res) {
                myGrid.clearAll();
                if (res && res.length > 0) {
                    res.forEach(function(item, idx) {
                        var rId = idx + 1;

                        myGrid.addRow(rId, [
                            item.saveTime || '-', // [추가] 0번 인덱스: 등록일
                            item.agntNm,          // 1번: 화주사명
                            item.mtrlCd,
                            item.mtrlNm,
                            item.locCd,
                            item.stockQty,
                            item.paltType,
                            "<span style='color:green;font-weight:bold;'>저장완료</span>",
                            item.agntCd,
                            item.locId,
                            item.locNm,
                            item.mtrlYn
                        ]);

                        // [인덱스 보정] 등록일 추가로 화주코드(8번), 상품확인(11번)으로 밀림
                        if (!item.agntCd || item.agntCd.trim() === '' || item.mtrlYn === 'N') {
                            myGrid.setRowTextStyle(rId, "background-color: #FFD9D9;");
                        }
                    });
                }
            }
        });
    }

    $(document).ready(function () {
        // 1. 그리드 초기화 (기존 코드 유지)
        myGrid = new dhtmlXGridObject('gridbox');
        myGrid.setImagePath("https://cdn.dhtmlx.com/edge/skins/web/imgs/");
        myGrid.setHeader("등록일,화주사명,상품코드,상품명,로케이션,수량,팔렛트구분,상태,화주코드,로케이션ID,로케이션명,상품확인");
        myGrid.setColumnIds("saveTime,agntNm,mtrlCd,mtrlNm,locCd,stockQty,paltType,status,agntCd,locId,locNm,mtrlYn");
        myGrid.setInitWidths("200,120,100,180,120,80,100,80,80,80,120,80");
        myGrid.setColAlign("center,left,center,left,center,right,center,center,center,center,left,center");
        myGrid.setColTypes("ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro,ro");
        myGrid.init();

        // 2. [추가] 페이지 로드 시 자동 조회 실행
        // 약간의 지연을 주어 sendObject가 완전히 바인딩된 후 실행되게 할 수도 있습니다.
        loadTempList();
    });

    function fnCreateMissingLoc() {
        if (!confirm("로케이션 마스터에 없는 항목들을 자동으로 생성하시겠습니까?")) return;

        $.ajax({
            url: "/erp105013CreateMissingLoc",
            type: "POST",
            data: {
                cmpyCd: 'A',
                whCd: '1000' // 또는 sendObject.whCd
            },
            success: function (res) {
                alert(res + "개의 신규 로케이션이 생성되었습니다.");
                loadTempList(); // 그리드 새로고침 (이제 붉은색이 사라짐)
            },
            error: function() {
                alert("로케이션 생성 중 오류가 발생했습니다.");
            }
        });
    }

    function fnCreateFloorLoc() {
        if (!confirm("최근 3개월간 거래가 있었던 화주사별 평치존을 생성하시겠습니까?")) return;

        $.ajax({
            url: "/erp105013CreateFloorLoc",
            type: "POST",
            data: {
                cmpyCd: 'A',
                whCd: '1000' // 요청하신 창고 코드
            },
            success: function (res) {
                alert("평치 로케이션 생성이 완료되었습니다.");
                loadTempList(); // 그리드 새로고침
            },
            error: function() {
                alert("처리 중 오류가 발생했습니다.");
            }
        });
    }

    function fnFinalConfirm() {
        var errorRows = 0;
        myGrid.forEachRow(function(id) {
            // [수정] 등록일 추가로 인덱스 1씩 증가
            // 8번: agntCd(화주코드), 11번: mtrlYn(상품확인)
            var agntCd = myGrid.cells(id, 8).getValue();
            var mtrlYn = myGrid.cells(id, 11).getValue();

            if (!agntCd || agntCd.trim() === '' || mtrlYn === 'N') {
                errorRows++;
            }
        });

        if (errorRows > 0) {
            if (!confirm("오류 데이터가 " + errorRows + "건 있습니다. 무시하고 진행하시겠습니까?")) return;
        } else {
            if (!confirm("임시 데이터를 실제 재고로 최종 반영하시겠습니까?")) return;
        }

        $.ajax({
            url: "/erp105013Confirm",
            type: "POST",
            data: {
                cmpyCd: 'A',
                whCd: '1000',
                saveUser: loginUser // 'ADMIN' 대신 변수 사용
            },
            success: function (res) {
                alert("최종 재고 반영이 완료되었습니다.");
                location.reload(); // 성공 후 화면 갱신
            }
        });
    }
</script>
</script>
</body>
</html>
