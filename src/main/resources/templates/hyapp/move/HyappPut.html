<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>적치 (HyappPut)</title>
    <style>
        :root { --bg:#f7f7f7; --card:#fff; --border:#e8e8e8; --text:#111; --sub:#666; --blue:#e0f2fe; --yellow:#fff7ed; }
        body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); }
        header { position: sticky; top:0; background:#fff; border-bottom:1px solid #e5e5e5; padding:12px 16px; z-index:10; }
        h1 { margin:0; font-size:16px; }
        main { padding:16px; padding-bottom:24px; }

        .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin:10px 0; box-shadow: 0 1px 0 rgba(0,0,0,0.02); }
        .title { display:flex; align-items:center; justify-content:space-between; gap:10px; }
        .badge { font-size:12px; padding:2px 8px; border:1px solid #ddd; border-radius:999px; color:#333; background:#fafafa; }
        .badge.done { background: var(--blue); border-color:#bae6fd; color:#0369a1; }
        .badge.warn { background: var(--yellow); border-color:#fed7aa; color:#b45309; }

        .row { display:flex; gap:10px; align-items:center; margin-top:10px; }
        .col { display:flex; flex-direction:column; gap:8px; flex:1; min-width:0; }

        .input {
            width:100%;
            padding:12px; border:1px solid #ddd; border-radius:10px; background:#fff;
            font-size:16px; height:44px; box-sizing:border-box;
        }
        .btn {
            padding:12px 14px; border:1px solid #ddd; border-radius:10px; background:#fff;
            font-size:16px; cursor:pointer; height:44px; box-sizing:border-box;
            white-space:nowrap;
        }
        .btn.dark { background:#111; color:#fff; border-color:#111; }
        .btn:disabled { opacity:.55; cursor:not-allowed; }

        .hint { margin:10px 2px 0; font-size:12px; color:#6b7280; line-height:1.35; }
        .status { margin:12px 2px 10px; font-size:13px; color:#111; min-height:18px; }
        .muted { color:var(--sub); font-size:12px; }

        .meta { margin-top:10px; font-size:14px; color:#333; display:grid; gap:8px; }
        .meta div { display:flex; justify-content:space-between; gap:10px; }
        .meta span { color:var(--sub); }

        .list-card {
            background:#fff;
            border:1px solid #eaeaea;
            border-radius:14px;
            padding:14px;
            margin:10px 0;
            box-shadow: 0 2px 10px rgba(0,0,0,.03);
            cursor:pointer;
        }
        .list-card.selected {
            outline: 2px solid #111;
            border-color: #111;
        }

        .split-row { border:1px dashed #ddd; border-radius:12px; padding:12px; margin-top:10px; }
        .split-head { display:flex; justify-content:space-between; align-items:center; gap:10px; }
        .pill { font-size:12px; padding:2px 8px; border:1px solid #ddd; border-radius:999px; background:#fafafa; }

        .grid3 { display:grid; grid-template-columns: 1.3fr 1fr 0.7fr; gap:10px; margin-top:10px; }
        @media (max-width:420px){
            .grid3 { grid-template-columns: 1fr; }
        }

        pre { white-space: pre-wrap; word-break: break-word; margin:0; }
    </style>
</head>

<body>
<header>
    <h1>적치</h1>
</header>

<main>
    <!-- hidden -->
    <input type="hidden" id="tblInboundProductIdHidden" value="" />

    <div id="status" class="status"></div>

    <!-- 필터/조회 -->
    <div class="card">
        <div style="font-weight:600;">검수 완료 목록</div>
        <div class="row">
            <input id="dateInput" class="input" type="date" />
            <button id="reloadBtn" class="btn dark" type="button">조회</button>
        </div>
        <div class="hint">* 선택한 날짜 기준으로 <b>검수 완료(COMPLETE)</b>된 입고건만 조회합니다.</div>
        <div id="list" style="margin-top:10px;"></div>
    </div>

    <!-- 선택된 항목 -->
    <div id="selectedCard" class="card" style="display:none;">
        <div class="title">
            <div><b id="mtrlNm">-</b></div>
            <span class="badge done">검수완료</span>
        </div>
        <div class="meta">
            <div><span>화주</span><b id="agntNm">-</b></div>
            <div><span>상품코드</span><b id="mtrlCd">-</b></div>
            <div><span>실제수량</span><b id="actualQty">-</b></div>
            <div><span>검수일</span><b id="actualDate">-</b></div>
            <div><span>완료시간</span><b id="completeTime">-</b></div>
        </div>
    </div>

    <!-- 디버그(필요시만) -->
    <div id="debugCard" class="card" style="display:none;">
        <div style="font-weight:600;">디버그</div>
        <div class="muted" style="margin-top:6px;">URL에 <b>?debug=1</b> 붙이면 노출됩니다.</div>
        <pre id="debugPre" style="margin-top:10px;"></pre>
    </div>
</main>

<script>
    // =====================
    // API endpoints
    // =====================
    const API_LIST_URL = "/hyapp/api/inbound/qc/complete";   // GET ?date=YYYY-MM-DD
    const PUT_SAVE_PAGE = "/hyapp/putSave";                 // 상세(적치 등록) 화면

    // =====================
    // elements
    // =====================
    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("list");
    const dateInput = document.getElementById("dateInput");
    const reloadBtn = document.getElementById("reloadBtn");
    const tblInboundProductIdHidden = document.getElementById("tblInboundProductIdHidden");

    const debugMode = new URLSearchParams(location.search).get("debug") === "1";
    const debugCard = document.getElementById("debugCard");
    const debugPre = document.getElementById("debugPre");
    if (debugMode) debugCard.style.display = "block";
    const setDebug = (v) => { if (debugMode) debugPre.textContent = v || ""; };

    // =====================
    // utils
    // =====================
    function setStatus(t){ statusEl.textContent = t || ""; }
    function escapeHtml(str){
        return String(str ?? "")
            .replaceAll("&","&amp;")
            .replaceAll("<","&lt;")
            .replaceAll(">","&gt;")
            .replaceAll('"',"&quot;")
            .replaceAll("'","&#39;");
    }
    function pick(obj, keys){
        for (const k of keys){
            const v = obj?.[k];
            if (v !== undefined && v !== null && String(v) !== "") return v;
        }
        return null;
    }
    function todayLocalISO(){
        const d = new Date();
        const tz = d.getTimezoneOffset() * 60000;
        return new Date(d.getTime() - tz).toISOString().slice(0,10);
    }

    // =====================
    // state
    // =====================
    let items = [];

    // 상세 페이지로 넘길 선택 데이터 저장 키
    const STORAGE_KEY = "HYAPP_PUT_SELECTED";

    // =====================
    // render
    // =====================
    function renderList(list){
        if (!list || list.length === 0){
            listEl.innerHTML = '<div class="list-card empty">검수 완료된 건이 없습니다.</div>';
            listEl.onclick = null;
            return;
        }

        listEl.innerHTML = list.map((it, idx) => {
            const agntNm = pick(it, ["agntNm","AGNT_NM"]);
            const mtrlNm = pick(it, ["mtrlNm","MTRL_NM"]);
            const mtrlCd = pick(it, ["mtrlCd","MTRL_CD"]);

            // 수량(표시용)
            const actualQty = Number(pick(it, ["actualQuantity","ACTUAL_QUANTITY"]) ?? 0);     // 검수완료수량
            const totalPutQty = Number(pick(it, ["totalPutawayQty","TOTAL_PUT_QTY"]) ?? 0);    // 적치완료수량
            const remaining = pick(it, ["remainingQty","REMAINING_QTY"]);
            const remainQty = Number(remaining ?? (actualQty - totalPutQty));                      // 적치가능수량

            const inboundId = pick(it, ["tblInboundProductId","TBL_INBOUND_PRODUCT_ID","tbl_inbound_product_id"]);
            const completeTime = pick(it, ["completeTime","COMPLETE_TIME"]) ?? "-";

            return `
        <div class="list-card" data-idx="${idx}">
          <div class="title">
            <div style="min-width:0; font-size:15px;"><b>${escapeHtml(mtrlNm || "-")}</b></div>
            <span class="badge done">검수완료</span>
          </div>
          <div class="muted" style="margin: 4px 0 8px;">${escapeHtml(mtrlCd || "-")} | ${escapeHtml(agntNm || "-")}</div>

          <div class="meta" style="background:#f9fafb; padding:10px; border-radius:8px; grid-template-columns: 1fr 1fr 1fr;">
            <div style="flex-direction: column; align-items:flex-start; gap:2px;">
              <span style="font-size:11px;">검수완료수량</span>
              <b style="color:#111;">${Number.isFinite(actualQty) ? actualQty : 0}</b>
            </div>
            <div style="flex-direction: column; align-items:flex-start; gap:2px; border-left:1px solid #eee; padding-left:10px;">
              <span style="font-size:11px;">적치완료수량</span>
              <b style="color:#666;">${Number.isFinite(totalPutQty) ? totalPutQty : 0}</b>
            </div>
            <div style="flex-direction: column; align-items:flex-start; gap:2px; border-left:1px solid #eee; padding-left:10px;">
              <span style="font-size:11px; color:#0369a1;">적치가능수량</span>
              <b style="color:#0369a1; font-size:16px;">${Number.isFinite(remainQty) ? remainQty : 0}</b>
            </div>
          </div>

          <div class="muted" style="margin-top:10px; font-size:11px;">
            완료: ${escapeHtml(completeTime)} · ID: ${escapeHtml(inboundId ?? "-")}
          </div>
        </div>
      `;
        }).join("");

        listEl.onclick = (e) => {
            const card = e.target.closest(".list-card");
            if (!card || card.classList.contains("empty")) return;
            const idx = Number(card.dataset.idx);
            if (!Number.isFinite(idx)) return;
            goPutSave(idx);
        };
    }

    function goPutSave(idx){
        const selected = items[idx];
        const inboundId = pick(selected, ["tblInboundProductId","TBL_INBOUND_PRODUCT_ID","tbl_inbound_product_id"]);
        if (!inboundId) return alert("TBL_INBOUND_PRODUCT_ID 값이 없습니다. 목록 조회 API 응답에 ID가 포함되어야 합니다.");

        // hidden에 보관(선택)
        tblInboundProductIdHidden.value = inboundId;

        // 상세페이지에서 사용 가능하도록 sessionStorage에 저장
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ selected, tblInboundProductId: inboundId }));

        // 이동
        // 현재 검색 날짜도 저장
        const curDate = (dateInput.value || "").trim();
        if (curDate) sessionStorage.setItem("HYAPP_PUT_DATE", curDate);

        // 이동 (날짜 파라미터 포함)
        const qs = new URLSearchParams();
        qs.set("tblInboundProductId", inboundId);
        if (curDate) qs.set("date", curDate);
        location.href = `${PUT_SAVE_PAGE}?${qs.toString()}`;
    }

    // =====================
    // load
    // =====================
    async function loadList(){
        const d = (dateInput.value || "").trim() || todayLocalISO();
        dateInput.value = d; // 빈 값이면 오늘로 복구

        reloadBtn.disabled = true;
        setStatus("조회 중...");
        listEl.innerHTML = "";

        try{
            const url = `${API_LIST_URL}?date=${encodeURIComponent(d)}`;
            const res = await fetch(url, { method:"GET", headers:{ "Accept":"application/json" }});
            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const data = await res.json();
            items = Array.isArray(data) ? data : (data.items || data.list || []);
            renderList(items);
            setStatus(`조회 완료 (${items.length}건)`);
            setDebug(JSON.stringify({date:d, itemsLen:items.length, sample:items[0]||null}, null, 2));
        }catch(e){
            console.error(e);
            setStatus(`조회 실패: ${e.message}`);
            listEl.innerHTML = '<div class="list-card empty">조회 중 오류가 발생했습니다. 서버/네트워크를 확인해주세요.</div>';
            setDebug(String(e));
        }finally{
            reloadBtn.disabled = false;
        }
    }

    // =====================
    // events
    // =====================
    reloadBtn.addEventListener("click", loadList);

    // 날짜 바뀌면 자동 조회(원하면 제거 가능)
    dateInput.addEventListener("change", loadList);

    // initial
    const qsInit = new URLSearchParams(location.search);
    const dateFromQs = (qsInit.get("date") || "").trim();
    dateInput.value = dateFromQs || todayLocalISO();
    loadList();
</script>

</body>
</html>
