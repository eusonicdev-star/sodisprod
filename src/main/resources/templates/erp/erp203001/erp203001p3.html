  <style>
    .gridbox .obj td {
      height: 30px !important;
      vertical-align: middle !important; /* 텍스트 세로 중앙 정렬 */
      padding: 5px !important; /* 셀 내부 여백 */
    }

    .gridbox .hdr td {
      height: 35px !important;
      vertical-align: middle !important;
      padding: 5px !important;
    }

    /* 멀티라인 텍스트를 위한 추가 스타일 */
    .gridbox .obj td div {
      line-height: 1.2 !important;
      word-wrap: break-word !important;
    }

    .gridbox .objbox {
      height: 0;
    }
  </style>
  <script th:inline="javascript">
    var pagePerRow = /*[[${@environment.getProperty('common.html.pagePerRow')}]]*/ //페이지당 몇줄을 보여줄것인가
    var srchInput;
    fnObj = {
      winOpen: {}, //END of winOpen:{
      comboOpen: {}, //END of comboOpen : {
      gridOpen: {
        grid: function () {
          myGrid.setImagePath("https://cdn.dhtmlx.com/edge/skins/web/imgs/");
          myGrid.setHeader(
                  "시공기사ID,시공기사,시공<br>건수,CMB,팔렛트<br>번호,시공비,물류센터코드,물류센터,시공계획<br>유무,휴무<br>유무"
          );
          myGrid.setColumnIds(
                  "tblUserMId,instEr,instCnt,cbm,paltNoxx,instCost,dcCd,dcNm,instPlanYn,hldyYn"
          );
          myGrid.setInitWidths("80,80,60,60,60,60,60,100,70,60");

          myGrid.setColAlign(
                  "center,center,center,right,center,right,center,center,center,center,center"
          );
          myGrid.setColTypes("ro,ro,ro,ro,ro,ro,ro,ro,ro,ro");
          myGrid.setColSorting("str,str,str,str,str,str,str,str,str,str");

          myGrid.attachHeader(
                  ",#text_filter,,,#text_filter,,,#text_filter,#text_filter,#text_filter"
          );

          myGrid.init(); //이걸써야 세팅한 그리드가 표시가 된다

          myGrid.enableSmartRendering(true); //스마트렌더링기능 가능	//데이터를 많이 구했더라도 제일 처음 에는 화면 크기에 나올수있을만큼만 보여준다. 스크롤을 움직이면 그떄 갖고있던 데이터들을 그려주기 시작한다
          myGrid.enablePreRendering(10); //20220423 정연호 추가
          fnObj.gridOpen.setWidth();

          myGrid.addRow(1, ""); //로우 추가
          myGrid.deleteRow(1);

          myGrid.setColumnHidden(myGrid.getColIndexById("tblUserMId"), true);
          myGrid.setColumnHidden(myGrid.getColIndexById("dcCd"), true);

          myGrid.enableEditEvents(true, false, false); //이걸쓰면 로우의 onRowDblClicked 이벤트 때문에 onEditCell 이벤트가 안되는것을 막을수 있다	//클릭, 더블클릭,F2
          myGrid.enableBlockSelection(true);
          myGrid.attachEvent("onKeyPress", fnObj.keyOpen.onKeyPressed);

          myGrid.attachEvent("onRowDblClicked", function (rId, cInd) {
            //기사이름
            var instErVal = myGrid
                    .cellById(rId, myGrid.getColIndexById("instEr"))
                    .getValue();
            //팔레트번호
            var paltNoxxVal = myGrid
                    .cellById(rId, myGrid.getColIndexById("paltNoxx"))
                    .getValue();

            var instPlanYn = myGrid
                    .cellById(rId, myGrid.getColIndexById("instPlanYn"))
                    .getValue();
            if (instPlanYn != "N") {
              if (
                      !confirm(
                              instErVal +
                              "기사님은 " +
                              paltNoxxVal +
                              "번 팔렛트에 배정되어있습니다.\n변경하시겠습니까?"
                      )
              ) {
                return;
              }
            }
            var hldyYn = myGrid
                    .cellById(rId, myGrid.getColIndexById("hldyYn"))
                    .getValue();
            if (hldyYn != "N") {
              alert("휴무가 있어 선택할수 없습니다.");
              return;
            }
            rtnObj = [];
            rtnObj.push(myGrid.getRowData(rId));
            parent.fnObj.winOpen.rtnObject(sendObj.windowId, rtnObj, null);
            parent.myWins.window(sendObj.windowId).close();
          });

          window.onresize = function (event) {
            //윈도우의 사이즈가 변경했을떄
            fnObj.gridOpen.setWidth();
          };
        }, //ENd of grid : function(){}
        setWidth: function () {
          searchDiv_height = $("#searchDiv").height();

          xhdr_height = $(".xhdr").height();
          myGrid.enableAutoWidth(true, window.innerWidth, 200);
          myGrid.enableAutoHeight(
                  true,
                  window.innerHeight - searchDiv_height - xhdr_height - 15
          ); //그리드 자동높이
        }, //END of setWidth
      }, //ENd of gridOpen : {
      searchOpen: {
        search: function () {
          myGrid.clearAll(false); //그리드 데이터 지우기.false 를 쓰면 헤더타이틀은 남겨둔다

          //검색조건을 폼 형식으로 생성하기
          var srchData = new FormData();
          srchData.append("cmpyCd", sendObj.cmpyCd);
          srchData.append("instDt", sendObj.instDt);
          srchData.append("dcCd", sendObj.dcCd);

          $.ajax({
            url: "/erp203001InstErSrch3",
            processData: false,
            contentType: false,
            data: srchData,
            type: "POST",
            datatype: "json",
            async: false,
            success: function (res) {
              if (res) {
                myGrid.clearAll(false);
                var columns = myGrid.getColumnCount();
                for (var i = 0; i < res.length; i++) {
                  var jsonData = {};
                  for (var c = 0; c < columns; c++) {
                    jsonData[myGrid.getColumnId(c)] =
                            res[i][myGrid.getColumnId(c)];
                  }

                  myGrid.addRow(i + 1, ""); //로우 추가	//로우는 1부터 시작해야함. 0부터 시작하면 안됨. 그래서 i 에 1을 더함

                  myGrid.setRowData(i + 1, jsonData);

                  var instPlanYn = myGrid
                          .cellById(i + 1, myGrid.getColIndexById("instPlanYn"))
                          .getValue();
                  if (instPlanYn == "Y") {
                    myGrid.setRowColor(i + 1, "lightgray");
                  }

                  var hldyYn = myGrid
                          .cellById(i + 1, myGrid.getColIndexById("hldyYn"))
                          .getValue();
                  if (hldyYn == "Y") {
                    myGrid.setRowColor(i + 1, "lightgray");
                  }
                }
              } else {
                alert("리스트 조회 수행 결과 없음");
              }
              fnObj.gridOpen.setWidth();
              fnObj.gridOpen.setWidth();
            },
          });
          fnObj.gridOpen.setWidth();
        }, //END of search : function() {
      }, //ENd of searchOpen : {

      keyOpen: {
        onKeyPressed: function (code, ctrl, shift) {
          if (code == 67 && ctrl) {
            myGrid.setCSVDelimiter("\t");
            myGrid.copyBlockToClipboard();
          }
          if (code == 86 && ctrl) {
            myGrid.pasteBlockFromClipboard();
          }
          return true;
        },
      },
    }; //END of fnObj

    $(document).ready(function () {
      myGrid = new dhtmlXGridObject("grid"); //그리드
      fnObj.gridOpen.grid();

      sendObj =
              /*[[${sendObject}]]*/

              fnObj.searchOpen.search();

      fnObj.gridOpen.setWidth();
      fnObj.gridOpen.setWidth();
    });
  </script>
</head>

<div

    <div id="inputDiv1" style="width: 100%; font-size: 12px">

                <span class="item-data" style="width:100%;">
                    <input id="btnSelectData" type="button" onclick="parent.myWins.window('grid2InstErStatOpen').close();" value="닫기"  style="float: right;">
                </span>
            </span> -->
    </div>
  </div>
  <div id="grid" style="width: 100%; height: 100%">
    <!-- 그리드영역 -->
  </div>
</div>
</body>
